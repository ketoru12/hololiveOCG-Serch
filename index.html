<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Hololive OCG カード検索ビューア</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  h2 { margin-bottom: 10px; }
  input, select { padding: 6px; margin-right: 10px; }

  #controls { margin-bottom: 20px; }

  #cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
  }

  .card {
    border: 1px solid #ccc;
    padding: 10px;
    border-radius: 6px;
    background: #fafafa;
  }

  .card img {
    width: 100%;
    border-radius: 4px;
  }

  .tags span {
    display: inline-block;
    background: #eee;
    padding: 2px 6px;
    margin: 2px;
    border-radius: 4px;
    font-size: 12px;
  }
</style>
</head>
<body>

<h2>Hololive OCG カード検索ビューア</h2>

<input type="file" id="fileInput" accept=".csv" />

<div id="controls">
  <input type="text" id="search" placeholder="全文検索…" />

  <select id="colorFilter">
    <option value="">色（すべて）</option>
    <option value="白">白</option>
    <option value="青">青</option>
    <option value="赤">赤</option>
    <option value="黄">黄</option>
    <option value="紫">紫</option>
  </select>

  <select id="batonFilter">
    <option value="">バトンタッチ（すべて）</option>
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>

  <input type="text" id="tagFilter" placeholder="タグ検索（例：#元気）" />
  <input type="text" id="keywordFilter" placeholder="キーワード検索（例：コラボ）" />
</div>

<div id="cards"></div>

<script>
// CSV パース（空白セルを "" として扱う）
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  const header = lines[0].split(",");
  const rows = lines.slice(1).map(line => {
    const cols = line.match(/("([^"]|"")*"|[^,]+)/g) || [];
    return cols.map(c => {
      if (!c) return ""; // ← 空白セルは空文字として扱う
      return c.replace(/^"|"$/g, "").replace(/""/g, '"');
    });
  });
  return { header, rows };
}

let csvData = null;

// CSV 読み込み
document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    csvData = parseCSV(reader.result);
    renderCards(csvData.rows);
  };
  reader.readAsText(file, "UTF-8");
});

// カード描画
function renderCards(rows) {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  rows.forEach(r => {
    const [
      url, img, name, cardType, color, hp, bloom, baton,
      arts, extra, keyword, number, product,
      tag1, tag2, tag3, tag4, tag5, tag6
    ] = r;

    const tags = [tag1, tag2, tag3, tag4, tag5, tag6].filter(t => t);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img}" alt="${name}">
      <h3>${name}</h3>
      <p><b>色:</b> ${color}　<b>HP:</b> ${hp}　<b>Bloom:</b> ${bloom}</p>
      <p><b>バトンタッチ:</b> ${baton}</p>
      <p><b>キーワード:</b> ${keyword}</p>
      <p><b>商品:</b> ${product}</p>
      <p><b>アーツ:</b> ${arts}</p>
      <p><b>エクストラ:</b> ${extra}</p>
      <div class="tags">
        ${tags.map(t => `<span>${t}</span>`).join("")}
      </div>
      <a href="${url}" target="_blank">カード詳細ページ</a>
    `;

    container.appendChild(div);
  });
}


// フィルタ処理
function applyFilters() {
  if (!csvData) return;

  const q = document.getElementById("search").value.toLowerCase();
  const color = document.getElementById("colorFilter").value;
  const baton = document.getElementById("batonFilter").value;
  const tag = document.getElementById("tagFilter").value.toLowerCase();
  const keyword = document.getElementById("keywordFilter").value.toLowerCase();

  const filtered = csvData.rows.filter(r => {
    const [
      url, img, name, cardType, colorVal, hp, bloom, batonVal,
      arts, extra, keywordVal, number, product,
      tag1, tag2, tag3, tag4, tag5, tag6
    ] = r;

    const tags = [tag1, tag2, tag3, tag4, tag5, tag6].join(" ").toLowerCase();

    if (q && !r.join(" ").toLowerCase().includes(q)) return false;
    if (color && colorVal !== color) return false;
    if (baton && batonVal !== baton) return false;
    if (tag && !tags.includes(tag)) return false;
    if (keyword && !keywordVal.toLowerCase().includes(keyword)) return false;

    return true;
  });

  renderCards(filtered);
}


// 各フィルタにイベントを付与
["search","colorFilter","batonFilter","tagFilter","keywordFilter"].forEach(id => {
  document.getElementById(id).addEventListener("input", applyFilters);
});
</script>

</body>
</html>
