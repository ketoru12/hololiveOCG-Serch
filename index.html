<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Hololive OCG カード検索ビューア(2.2)</title>
<style>
  body { font-family: "Helvetica Neue", Arial, sans-serif; padding: 20px; color: #333; background-color: #f4f7f8; }
  h2 { color: #0088cc; border-left: 5px solid #0088cc; padding-left: 10px; }
  .search-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 100; }
  .filter-group { display: flex; flex-direction: column; }
  .filter-group label { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
  input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
  .table-wrapper { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  table { width: 100%; border-collapse: collapse; min-width: 1300px; border: 1px solid #ccc; table-layout: fixed; }
  th:nth-child(1) { width: 90px; } th:nth-child(2) { width: 150px; } th:nth-child(3) { width: 100px; }
  th:nth-child(4) { width: 50px; } th:nth-child(5) { width: 70px; } th:nth-child(6) { width: auto; }
  th:nth-child(7) { width: 100px; } th:nth-child(8) { width: 250px; } th:nth-child(9) { width: 60px; }
  th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: top; font-size: 13px; overflow: hidden; }
  th { background: #0088cc; color: white; position: sticky; top: 80px; z-index: 10; white-space: nowrap; }
  tr:hover { background-color: #f0faff; }
  .card-img { width: 80px; height: auto; border-radius: 4px; cursor: pointer; min-height: 110px; background: #eee; }
  .tag-container { display: flex; flex-direction: column; gap: 4px; }
  .tag { background: #e0e0e0; color: #555; padding: 2px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; }
  .arts-text { line-height: 1.5; color: #222; overflow-wrap: break-word; }
  .prod-text { line-height: 1.6; color: #444; font-size: 11px; white-space: nowrap; }
  .name-text { font-weight: bold; color: #0055aa; display: block; }
  #imageModal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; cursor: zoom-out; }
  #modalImage { max-width: 90%; max-height: 90%; border-radius: 10px; }
  .load-more-row td { text-align: center; cursor: pointer; background: #f9f9f9; color: #0088cc; font-weight: bold; padding: 15px; border: 1px solid #ccc; }
</style>
</head>
<body>

<h2>Hololive OCG カード検索ビューア(2.2)</h2>

<div class="search-container">
  <div class="filter-group"><label>カードタイプ</label><select id="typeFilter"><option value="すべて">すべて</option><option value="ホロメン">ホロメン</option><option value="サポート">サポート</option><option value="推しホロメン">推しホロメン</option></select></div>
  <div class="filter-group"><label>キーワード検索</label><input type="text" id="searchKeyword" placeholder="名前や効果で検索..."></div>
  <div class="filter-group"><label>色</label><select id="colorFilter"><option value="">すべて</option><option value="白">白</option><option value="青">青</option><option value="赤">赤</option><option value="黄">黄</option><option value="紫">紫</option><option value="緑">緑</option><option value="無">無</option></select></div>
</div>

<div class="table-wrapper">
  <table>
    <thead><tr><th>画像</th><th>名前(番号)</th><th>タイプ</th><th>色</th><th>HP/L</th><th>効果/スキル</th><th>タグ</th><th>収録</th><th>詳細</th></tr></thead>
    <tbody id="cardBody"></tbody>
  </table>
</div>

<div id="imageModal" onclick="closeModal()"><img id="modalImage" src=""></div>

<script>
  let allRawData = { holomen: [], support: [], oshi: [] };
  let currentFilteredData = [];
  const DISPLAY_CHUNK = 50;

  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const load = async (file) => {
        const r = await fetch(file);
        if (!r.ok) return [];
        const text = await r.text();
        const rows = parseCSV(text);
        // 各CSVの1行目（ヘッダー）をここで確実に捨てる
        return rows.length > 0 ? rows.slice(1) : [];
      };
      
      allRawData.holomen = await load('hololive_cards.csv');
      allRawData.support = await load('hololive_support.csv');
      allRawData.oshi = await load('hololive_oshi.csv');
      
      applyFilters();
    } catch (e) { console.error(e); }
  });

  function parseCSV(text) {
    if (!text || !text.includes(',')) return [];
    const rows = [];
    let row = [], col = "", inQuote = false;
    const cleanText = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    for (let i = 0; i < cleanText.length; i++) {
      let c = cleanText[i], next = cleanText[i+1];
      if (inQuote) {
        if (c === '"' && next === '"') { col += '"'; i++; }
        else if (c === '"') inQuote = false;
        else col += c;
      } else {
        if (c === '"') inQuote = true;
        else if (c === ',') { row.push(col); col = ""; }
        else if (c === '\n') {
          row.push(col);
          if (row.some(x => x.trim() !== "")) rows.push(row);
          row = []; col = "";
        } else col += c;
      }
    }
    if (row.length > 0 && row.some(x => x.trim() !== "")) { row.push(col); rows.push(row); }
    return rows;
  }

  function applyFilters() {
    const type = document.getElementById("typeFilter").value;
    const kw = document.getElementById("searchKeyword").value.trim().toLowerCase();
    const color = document.getElementById("colorFilter").value;
    let combined = [];

    if (type === "すべて" || type === "ホロメン") {
      allRawData.holomen.forEach(r => {
        if (r.length < 12) return;
        combined.push({
          url: r[0], img: r[1], name: r[2], type: "ホロメン", color: r[4], 
          hp: r[5], info: `[${r[6]}] ${r[7]}<br>${r[8]}`, num: r[11], prod: r[12],
          tags: r.slice(13).filter(t => t && t.trim() !== ""), raw: r.join(" ").toLowerCase()
        });
      });
    }
    if (type === "すべて" || type === "サポート") {
      allRawData.support.forEach(r => {
        if (r.length < 6) return;
        combined.push({
          url: r[0], img: "", name: r[1], type: r[2], color: "-", 
          hp: "-", info: `[${r[3]}]<br>${r[4]}`, num: r[6], prod: r[5],
          tags: [], raw: r.join(" ").toLowerCase()
        });
      });
    }
    if (type === "すべて" || type === "推しホロメン") {
      allRawData.oshi.forEach(r => {
        if (r.length < 9) return;
        combined.push({
          url: r[0], img: "", name: r[1], type: "推しホロメン", color: r[3], 
          hp: r[4], info: `スキル: ${r[5]}<br>SP: ${r[6]}`, num: r[9], prod: r[8],
          tags: [], raw: r.join(" ").toLowerCase()
        });
      });
    }

    currentFilteredData = combined.filter(c => {
      if (kw && !c.raw.includes(kw)) return false;
      if (color && c.color !== color) return false;
      return true;
    });
    renderTable(0, false);
  }

  function renderTable(startIndex, append = false) {
    const tbody = document.getElementById('cardBody');
    if (!append) tbody.innerHTML = '';
    else { const b = tbody.querySelector('.load-more-row'); if (b) b.remove(); }
    
    const chunk = currentFilteredData.slice(startIndex, startIndex + DISPLAY_CHUNK);
    const fragment = document.createDocumentFragment();

    chunk.forEach(c => {
      const tr = document.createElement('tr');
      const cleanProd = c.prod ? c.prod.split('\n').map(p => p.trim()).join('<br>') : "";
      const tagsHtml = c.tags.map(t => `<span class="tag">${t}</span>`).join('');
      tr.innerHTML = `
        <td>${c.img ? `<img src="${c.img}" class="card-img" loading="lazy" onclick="openModal('${c.img}')">` : "-"}</td>
        <td><span class="name-text">${c.name}</span><small>${c.num}</small></td>
        <td><small>${c.type}</small></td>
        <td>${c.color}</td>
        <td>${c.hp}</td>
        <td class="arts-text">${c.info}</td>
        <td><div class="tag-container">${tagsHtml}</div></td>
        <td class="prod-text">${cleanProd}</td>
        <td><a href="${c.url}" target="_blank">公式</a></td>
      `;
      fragment.appendChild(tr);
    });
    tbody.appendChild(fragment);

    if (startIndex + DISPLAY_CHUNK < currentFilteredData.length) {
      const r = document.createElement('tr'); r.className = 'load-more-row';
      r.innerHTML = `<td colspan="9">もっと見る (残り ${currentFilteredData.length - (startIndex + DISPLAY_CHUNK)}件)</td>`;
      r.onclick = () => renderTable(startIndex + DISPLAY_CHUNK, true);
      tbody.appendChild(r);
    }
  }

  function openModal(src) { document.getElementById("imageModal").style.display = "flex"; document.getElementById("modalImage").src = src; }
  function closeModal() { document.getElementById("imageModal").style.display = "none"; }

  let t = null;
  document.getElementById("searchKeyword").oninput = () => { clearTimeout(t); t = setTimeout(applyFilters, 300); };
  document.getElementById("colorFilter").onchange = applyFilters;
  document.getElementById("typeFilter").onchange = applyFilters;
</script>
</body>
</html>
