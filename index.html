<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Hololive OCG カード検索ビューア</title>

<style>
  body { font-family: sans-serif; padding: 20px; }
  h2 { margin-bottom: 10px; }
  input, select { padding: 6px; margin-right: 10px; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: #f0f0f0;
  }
</style>
</head>
<body>

<script>
  let csvData = { rows: [] };

  // 1. ページ読み込み時に CSV を自動取得
  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const response = await fetch('hololive_cards.csv');
      if (!response.ok) throw new Error('CSVファイルの取得に失敗しました。');
      
      const text = await response.text();
      // 改行やカンマを含む高度なCSV解析
      csvData.rows = parseCSV(text);
      
      // 初回表示
      displayCards(csvData.rows);
    } catch (error) {
      console.error(error);
      alert('エラー: ' + error.message + '\n※GitHub Pagesにアップロードするか、ローカルサーバーで実行してください。');
    }
  });

  // 引用符内の改行に対応したCSVパーサー
  function parseCSV(text) {
    const rows = [];
    let row = [];
    let col = "";
    let inQuote = false;

    for (let i = 0; i < text.length; i++) {
      let char = text[i];
      let nextChar = text[i + 1];

      if (inQuote) {
        if (char === '"' && nextChar === '"') { col += '"'; i++; } // エスケープされた引用符
        else if (char === '"') { inQuote = false; }
        else { col += char; }
      } else {
        if (char === '"') { inQuote = true; }
        else if (char === ',') { row.push(col); col = ""; }
        else if (char === '\r' || char === '\n') {
          row.push(col);
          if (row.length > 1) rows.push(row);
          row = []; col = "";
          if (char === '\r' && nextChar === '\n') i++;
        } else { col += char; }
      }
    }
    // 最後の行の処理
    if (row.length > 0 || col !== "") {
      row.push(col);
      rows.push(row);
    }
    return rows.slice(1); // ヘッダー行を削除
  }

  function displayCards(rows) {
    const tbody = document.querySelector('#cardTable tbody');
    if (!tbody) return;
    tbody.innerHTML = '';

    rows.forEach(r => {
      const tr = document.createElement('tr');
      // CSVの列：url, img, name, cardType, color, hp, bloom, arts, keyword, baton, extra, number, product, tags...
      const [url, img, name, cardType, color, hp, bloom, arts, keyword, baton, extra, number, product] = r;
      const tags = r.slice(13).filter(t => t).join(' ');

      tr.innerHTML = `
        <td><img src="${img}" width="80" loading="lazy"></td>
        <td>${name}</td>
        <td>${color}</td>
        <td>${cardType}</td>
        <td>${hp}</td>
        <td>${bloom}</td>
        <td>${arts.replace(/\n/g, '<br>')}</td>
        <td>${keyword}</td>
        <td>${baton}</td>
        <td>${extra}</td>
        <td>${product}</td>
        <td>${tags}</td>
        <td><a href="${url}" target="_blank">詳細</a></td>
      `;
      tbody.appendChild(tr);
    });
  }

  // フィルタ機能（既存のものを流用・調整）
  function applyFilters() {
    if (!csvData.rows) return;

    const q = document.getElementById("search").value.toLowerCase();
    const color = document.getElementById("colorFilter").value;
    const baton = document.getElementById("batonFilter").value;

    const filtered = csvData.rows.filter(r => {
      const rowText = r.join(" ").toLowerCase();
      if (q && !rowText.includes(q)) return false;
      if (color && r[4] !== color) return false;
      if (baton && r[9] !== baton) return false;
      return true;
    });

    displayCards(filtered);
  }

  // イベントリスナーの登録
  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("colorFilter").addEventListener("change", applyFilters);
  document.getElementById("batonFilter").addEventListener("change", applyFilters);
</script>>
</body>
</html>
