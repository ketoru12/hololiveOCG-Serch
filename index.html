<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Hololive OCG カード検索ビューア_0.9</title>

<style>
  body { font-family: sans-serif; padding: 20px; }
  h2 { margin-bottom: 10px; }
  input, select { padding: 6px; margin-right: 10px; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: #f0f0f0;
  }
</style>
</head>
<body>

<script>
  let csvData = [];

  // 1. ページ読み込み時に CSV を自動取得
  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const response = await fetch('hololive_cards.csv');
      const text = await response.text();
      
      // CSVを行ごとに分割（単純な改行分割。データ内に改行がある場合は工夫が必要）
      const rows = text.trim().split('\n').map(row => {
        // カンマで分割するが、ダブルクォーテーション内のカンマを無視する正規表現
        return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, ''));
      });

      // ヘッダーを除去して保持
      const header = rows.shift();
      csvData = rows;

      // 初期表示
      displayCards(csvData);
    } catch (error) {
      console.error('CSVの読み込みに失敗しました:', error);
    }
  });

  // 2. カード一覧の表示関数
  function displayCards(data) {
    const tbody = document.querySelector('#cardTable tbody');
    tbody.innerHTML = '';

    data.forEach(row => {
      const tr = document.createElement('tr');
      // csvの列構造: url, img, name, cardType, color, hp, bloom, arts, keyword, baton, extra, number, product, tags...
      const [url, img, name, cardType, color, hp, bloom, arts, keyword, baton, extra, number, product, ...tags] = row;

      tr.innerHTML = `
        <td><img src="${img}" width="80"></td>
        <td>${name}</td>
        <td>${color}</td>
        <td>${cardType}</td>
        <td>${hp}</td>
        <td>${bloom}</td>
        <td>${arts}</td>
        <td>${keyword}</td>
        <td>${baton}</td>
        <td>${extra}</td>
        <td>${product}</td>
        <td>${tags.filter(t => t).join(', ')}</td>
        <td><a href="${url}" target="_blank">詳細</a></td>
      `;
      tbody.appendChild(tr);
    });
  }

  // 3. 検索・フィルタ機能（既存のロジックを流用）
  function applyFilters() {
    const query = document.getElementById("search").value.toLowerCase();
    const colorFilter = document.getElementById("colorFilter").value;
    // ... 他のフィルタ要素も同様に取得

    const filtered = csvData.filter(row => {
      const textMatch = row.join(' ').toLowerCase().includes(query);
      const colorMatch = !colorFilter || row[4] === colorFilter;
      return textMatch && colorMatch;
    });

    displayCards(filtered);
  }

  // 検索入力時に自動実行
  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("colorFilter").addEventListener("change", applyFilters);
</script>
</body>
</html>
