<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Holo-Viewer | High Visibility Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        .label-pill {
            background-color: #5e5a9b; color: white; padding: 2px 12px; border-radius: 999px;
            font-size: 12px; font-weight: bold; min-width: 95px; text-align: center; flex-shrink: 0;
        }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .oshi-pill { background-color: #ef4444; }
        .product-pill { background-color: #6366f1; }
        /* 文字サイズを大きく調整 */
        .value-box { font-size: 14px; font-weight: 500; line-height: 1.5; color: #1a202c; flex: 1; }
        .badge-base { padding: 2px 8px; border-radius: 4px; font-size: 13px; font-weight: 800; border: 1px solid transparent; }
        
        .color-white { background-color: #f8fafc; color: #475569; border-color: #e2e8f0; }
        .color-green { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .color-red { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .color-blue { background-color: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
        .color-purple { background-color: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
        .color-yellow { background-color: #fefce8; color: #854d0e; border-color: #fef08a; }
        .color-none { background-color: #f1f5f9; color: #334155; border-color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">

    <header class="bg-white border-b sticky top-0 z-50 p-3 shadow-sm">
        <div class="max-w-[1600px] mx-auto flex gap-3 items-center">
            <h1 class="font-bold text-lg text-[#5e5a9b]">HOLO-VIEWER</h1>
            <input type="text" id="searchInput" placeholder="検索..." class="flex-1 bg-slate-100 rounded-full px-5 py-1.5 text-sm outline-none focus:ring-2 focus:ring-[#5e5a9b]/30">
            <div id="resultCount" class="text-xs font-mono text-slate-400">READY</div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-3 md:p-5">
        <div id="cardGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-4"></div>
    </main>

    <script>
        let allCards = [];
        let fuse;
        const colorClassMap = { '白': 'color-white', '緑': 'color-green', '赤': 'color-red', '青': 'color-blue', '紫': 'color-purple', '黄': 'color-yellow', '無': 'color-none' };

        function getTokkouBadgeHtml(text) {
            if (!text) return "";
            const match = text.match(/(白|緑|赤|青|紫|黄|無)/);
            const colorClass = match ? colorClassMap[match[1]] : colorClassMap['無'];
            return `<span class="badge-base ${colorClass}">${text}</span>`;
        }

        function renderCostHtml(iconsStr) {
            if (!iconsStr) return "";
            return iconsStr.split(',').map(c => `<span class="badge-base ${colorClassMap[c.trim()] || colorClassMap['無']} mr-1">${c.trim()}</span>`).join('');
        }

        function createRow(label, value, extraClass = "") {
            if (!value || value === "0" || value === "" || value === "nan") return "";
            return `<div class="flex items-start mb-2 gap-3">
                        <span class="label-pill ${extraClass}">${label}</span>
                        <div class="value-box whitespace-pre-wrap">${value}</div>
                    </div>`;
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = `${cards.length} CARDS`;
            grid.innerHTML = '';

            cards.forEach(card => {
                const wrap = document.createElement('div');
                // 余白を狭く(p-5)設定
                wrap.className = "bg-white rounded-[1.5rem] shadow-sm border p-5 flex flex-col md:flex-row gap-5 hover:shadow-md transition-all h-full";
                
                let details = "";
                details += createRow('色/HP', `${card.color} / ${card.value}${card.kind ? ' ('+card.kind+')' : ''}`);
                
                if (card.arts) {
                    card.arts.forEach(art => {
                        details += `
                            <div class="flex items-start mb-2 gap-3">
                                <span class="label-pill arts-pill">アーツ</span>
                                <div class="value-box">
                                    <div class="flex flex-wrap items-center gap-1.5 mb-0.5">
                                        <div class="flex">${renderCostHtml(art.icons)}</div>
                                        <span class="font-black text-[15px]">${art.name} ${art.damage}</span>
                                        ${getTokkouBadgeHtml(art.tokkou)}
                                    </div>
                                    <div class="text-slate-600 text-[13px] leading-snug whitespace-pre-wrap">${art.text}</div>
                                </div>
                            </div>`;
                    });
                }

                if (card.skills) card.skills.forEach(s => details += createRow(s.label, s.text, 'oshi-pill'));
                if (card.description) details += createRow('効果', card.description);
                if (card.product) details += createRow('収録', card.product, 'product-pill text-[11px]');

                wrap.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-5 w-full">
                        <div class="w-full md:w-[180px] shrink-0">
                            <img src="${card.img}" class="rounded-lg shadow-sm border w-full h-auto" loading="lazy">
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-baseline border-b pb-1 mb-2">
                                <h3 class="text-xl font-bold text-[#5e5a9b]">${card.name}</h3>
                                <span class="text-[10px] font-mono text-slate-400">${card.id}</span>
                            </div>
                            <div class="mb-2 flex flex-wrap gap-1">
                                ${card.tags.map(t => `<span class="text-[11px] text-slate-400 font-bold mr-1">${t}</span>`).join('')}
                            </div>
                            ${details}
                        </div>
                    </div>`;
                grid.appendChild(wrap);
            });
        }

        async function init() {
            const res = await fetch('./master_cards.json');
            allCards = await res.json();
            fuse = new Fuse(allCards, { keys: ['name', 'arts.name', 'tags'], threshold: 0.3 });
            renderCards(allCards);
        }
        document.getElementById('searchInput').addEventListener('input', e => {
            renderCards(e.target.value ? fuse.search(e.target.value).map(r => r.item) : allCards);
        });
        init();
    </script>
</body>
</html>
