<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloCa Search System - Original Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        /* --- 以前の高度なスタイルを完全復元 --- */
        .label-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; min-width: 110px; text-align: center; flex-shrink: 0; }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .keyword-pill { background-color: #10b981; }
        .oshi-pill { background-color: #ef4444; }
        .stage-pill { background-color: #3b82f6; }
        .tag-item-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .product-pill { background-color: #6366f1; }
        .kind-pill { background-color: #64748b; }
        .value-box { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a202c; flex: 1; }
        
        .filter-label { display: block; font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: -0.01em; }
        .filter-active { background-color: #5e5a9b !important; color: white !important; font-weight: bold; border-color: #5e5a9b !important; }
        
        .logic-toggle { font-size: 10px; padding: 1px 6px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .logic-and { background-color: #ef4444; color: white; }
        .logic-or { background-color: #3b82f6; color: white; }

        .toggle-switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #5e5a9b; }
        input:checked + .slider:before { transform: translateX(14px); }

        @media (max-width: 768px) {
            #filterSidebar { position: fixed; bottom: 0; left: 0; right: 0; height: 85vh; transform: translateY(100%); transition: transform 0.3s ease-in-out; z-index: 200; border-radius: 20px 20px 0 0; }
            #filterSidebar.mobile-open { transform: translateY(0); }
            #filterOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; backdrop-filter: blur(2px); }
            #filterOverlay.active { display: block; }
        }

        #modal { display: none; }
        #modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="filterOverlay" onclick="toggleMobileFilter()"></div>

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <aside id="filterSidebar" class="w-full md:w-80 bg-white border-r flex flex-col shadow-lg z-50 overflow-hidden">
            <div class="p-4 border-b bg-[#5e5a9b] text-white flex justify-between items-center shrink-0">
                <h1 class="font-bold italic uppercase tracking-tighter text-xl">HoloCa Search</h1>
                <div class="flex items-center gap-2">
                    <span id="resultCount" class="text-xs bg-black/20 px-2 py-1 rounded">0</span>
                    <button class="md:hidden" onclick="toggleMobileFilter()">✕</button>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-5 text-slate-700">
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="filter-label">検索ワード</label>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-400">本文込</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="searchIncludeText" checked onchange="applyFilters()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <input type="text" id="searchInput" placeholder="名前、タグ、テキスト..." class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#5e5a9b]/30 outline-none">
                </div>

                <div>
                    <label class="filter-label mb-1">収録商品</label>
                    <select id="productSelect" onchange="applyFilters()" class="w-full border rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-[#5e5a9b]/30 outline-none">
                        <option value="">すべて</option>
                        <option value="hBP01">hBP01：ブルーミングレディアンス</option>
                        <option value="hSD01">hSD01：ときのそら＆AZKi</option>
                        <option value="hSD02">hSD02：がうる・ぐら</option>
                        <option value="hSD03">hSD03：兎田ぺこら</option>
                        <option value="hPR">hPR：プロモカード</option>
                    </select>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="filter-label">カードタイプ</label>
                        <div class="logic-toggle logic-or" id="logic-category" onclick="toggleLogic('category')">OR</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2.5 py-1 text-xs border rounded bg-white" data-group="category" data-val="ホロメン">ホロメン</button>
                        <button class="filter-btn px-2.5 py-1 text-xs border rounded bg-white" data-group="category" data-val="推しホロメン">推し</button>
                        <button class="filter-btn px-2.5 py-1 text-xs border rounded bg-white" data-group="category" data-val="サポート">サポート</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-1">色 (サポート以外が対象)</label>
                    <div class="grid grid-cols-7 gap-1">
                        <button class="color-dot aspect-square rounded-full border bg-red-500" data-type="color" data-val="赤"></button>
                        <button class="color-dot aspect-square rounded-full border bg-blue-500" data-type="color" data-val="青"></button>
                        <button class="color-dot aspect-square rounded-full border bg-green-500" data-type="color" data-val="緑"></button>
                        <button class="color-dot aspect-square rounded-full border bg-yellow-400" data-type="color" data-val="黄"></button>
                        <button class="color-dot aspect-square rounded-full border bg-purple-500" data-type="color" data-val="紫"></button>
                        <button class="color-dot aspect-square rounded-full border bg-white shadow-inner" data-type="color" data-val="白"></button>
                        <button class="color-dot aspect-square rounded-full border bg-slate-400" data-type="color" data-val="無"></button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="filter-label">サポート種別</label>
                        <div class="logic-toggle logic-or" id="logic-subKind" onclick="toggleLogic('subKind')">OR</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2 py-1 text-[10px] border rounded bg-white" data-group="subKind" data-val="LIMITED">LIMITED</button>
                        <button class="filter-btn px-2 py-1 text-[10px] border rounded bg-white" data-group="subKind" data-val="イベント">イベント</button>
                        <button class="filter-btn px-2 py-1 text-[10px] border rounded bg-white" data-group="subKind" data-val="ツール">ツール</button>
                        <button class="filter-btn px-2 py-1 text-[10px] border rounded bg-white" data-group="subKind" data-val="スタッフ">スタッフ</button>
                        <button class="filter-btn px-2 py-1 text-[10px] border rounded bg-white" data-group="subKind" data-val="アイテム">アイテム</button>
                        <button class="filter-btn px-2 py-1 text-[10px] border rounded bg-white" data-group="subKind" data-val="マスコット">マスコット</button>
                        <button class="filter-btn px-2 py-1 text-[10px] border rounded bg-white" data-group="subKind" data-val="ファン">ファン</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-1">特攻 (対色)</label>
                    <div class="grid grid-cols-7 gap-1">
                        <button class="color-dot aspect-square rounded-full border bg-red-500" data-type="tokkou" data-val="赤"></button>
                        <button class="color-dot aspect-square rounded-full border bg-blue-500" data-type="tokkou" data-val="青"></button>
                        <button class="color-dot aspect-square rounded-full border bg-green-500" data-type="tokkou" data-val="緑"></button>
                        <button class="color-dot aspect-square rounded-full border bg-yellow-400" data-type="tokkou" data-val="黄"></button>
                        <button class="color-dot aspect-square rounded-full border bg-purple-500" data-type="tokkou" data-val="紫"></button>
                        <button class="color-dot aspect-square rounded-full border bg-white shadow-inner" data-type="tokkou" data-val="白"></button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="filter-label">Bloomレベル</label>
                        <div class="logic-toggle logic-or" id="logic-kind" onclick="toggleLogic('kind')">OR</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2 py-1 text-xs border rounded bg-white" data-group="kind" data-val="Spot">Spot</button>
                        <button class="filter-btn px-2 py-1 text-xs border rounded bg-white" data-group="kind" data-val="Debut">Debut</button>
                        <button class="filter-btn px-2 py-1 text-xs border rounded bg-white" data-group="kind" data-val="1st">1st</button>
                        <button class="filter-btn px-2 py-1 text-xs border rounded bg-white" data-group="kind" data-val="2nd">2nd</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-1">バトンタッチ</label>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-3 py-1 text-xs border rounded bg-white" data-group="baton" data-val="0">0</button>
                        <button class="filter-btn px-3 py-1 text-xs border rounded bg-white" data-group="baton" data-val="1">1</button>
                        <button class="filter-btn px-3 py-1 text-xs border rounded bg-white" data-group="baton" data-val="2">2</button>
                        <button class="filter-btn px-3 py-1 text-xs border rounded bg-white" data-group="baton" data-val="3">3</button>
                    </div>
                </div>

                <button id="resetFilters" class="w-full py-2 text-[10px] font-black text-slate-400 border border-dashed rounded-lg hover:border-red-500 hover:text-red-500">RESET ALL</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 bg-slate-50">
            <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4" onclick="closeModal()">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto flex flex-col md:flex-row gap-6 p-6 relative" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-3xl text-slate-300" onclick="closeModal()">✕</button>
            <div class="w-full md:w-1/3 shrink-0"><img id="modalImg" src="" class="w-full rounded-lg shadow-xl border"></div>
            <div class="flex-1"><h2 id="modalName" class="text-2xl font-bold text-[#5e5a9b] mb-4 border-b pb-2"></h2><div id="modalDetails" class="space-y-2 text-sm"></div></div>
        </div>
    </div>

    <script>
        let allCards = [];
        let activeFilters = { text: '', category: [], kind: [], subKind: [], color: '', baton: [], tokkou: '' };
        let logicState = { category: 'OR', kind: 'OR', subKind: 'OR' };

        function applyFilters() {
            let result = allCards;
            const includeText = document.getElementById('searchIncludeText').checked;
            const product = document.getElementById('productSelect').value;

            if (product) result = result.filter(c => c.id.includes(product));

            if (activeFilters.text) {
                let keys = [{ name: 'name', weight: 1.0 }, { name: 'id', weight: 0.5 }, { name: 'tags', weight: 0.7 }];
                if (includeText) keys.push({ name: 'description', weight: 0.4 }, { name: 'arts.name', weight: 0.4 }, { name: 'arts.text', weight: 0.4 });
                const fuse = new Fuse(allCards, { keys, threshold: 0.3 });
                result = fuse.search(activeFilters.text).map(r => r.item);
            }

            const checkLogic = (val, filterList, logic) => {
                if (filterList.length === 0) return true;
                const v = String(val || '');
                return logic === 'OR' ? filterList.some(f => v.includes(f)) : filterList.every(f => v.includes(f));
            };

            if (activeFilters.category.length > 0) result = result.filter(c => checkLogic(c.category, activeFilters.category, logicState.category));
            
            // 色フィルター：単一選択 + サポート除外
            if (activeFilters.color) {
                result = result.filter(c => {
                    if (c.category === "サポート") return false;
                    return (c.color || '無').replace('◇','無') === activeFilters.color;
                });
            }

            if (activeFilters.subKind.length > 0) result = result.filter(c => checkLogic(c.kind, activeFilters.subKind, logicState.subKind));
            if (activeFilters.kind.length > 0) result = result.filter(c => checkLogic(c.kind, activeFilters.kind, logicState.kind));
            if (activeFilters.baton.length > 0) result = result.filter(c => activeFilters.baton.includes(String(c.baton_touch)));
            if (activeFilters.tokkou) {
                result = result.filter(c => c.arts && c.arts.some(a => a.tokkou && a.tokkou === activeFilters.tokkou));
            }
            
            renderCards(result);
        }

        function renderCards(cards) {
            document.getElementById('resultCount').innerText = cards.length;
            document.getElementById('cardGrid').innerHTML = cards.map(card => `
                <div class="cursor-pointer" onclick="showDetail('${card.id}')">
                    <img src="${card.img}" class="rounded shadow border hover:shadow-lg transition-all" loading="lazy">
                </div>
            `).join('');
        }

        function showDetail(cardId) {
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;
            document.getElementById('modalImg').src = card.img;
            document.getElementById('modalName').innerText = card.name;
            let details = "";
            const createRow = (label, value, extraClass = "") => {
                if (!value || value === "nan" || value === "0") return "";
                if (label === 'タグ') return `<div class="flex items-start mb-1 gap-3"><span class="label-pill">${label}</span><div class="flex flex-wrap gap-1">${value.map(t => `<span class="tag-item-pill" onclick="setSearchText('${t}')">${t}</span>`).join('')}</div></div>`;
                return `<div class="flex items-start mb-1 gap-3"><span class="label-pill ${extraClass}">${label}</span><div class="value-box">${value}</div></div>`;
            };
            details += createRow('ID', card.id, 'product-pill');
            details += createRow('タイプ', card.category);
            if (card.category === "サポート") details += createRow('種別', card.kind, 'kind-pill');
            if (card.category !== "サポート") details += createRow('色', (card.color || '無').replace('◇','無'));
            if (card.category === "ホロメン") {
                details += createRow('HP', card.value); details += createRow('Bloom', card.kind); details += createRow('バトン', card.baton_touch);
                if (card.keywordName) details += `<div class="flex items-start mb-1 gap-3"><span class="label-pill keyword-pill">能力</span><div class="value-box font-bold">【${card.keywordName}】<span class="font-normal text-slate-500">${card.keywordEffect}</span></div></div>`;
            }
            if (card.arts) card.arts.forEach(a => details += `<div class="flex items-start mb-1 gap-3 border-t pt-2"><span class="label-pill arts-pill">アーツ</span><div class="value-box"><div><span class="font-bold">${a.name}</span> <span class="text-red-600 font-bold">${a.damage || ''}</span></div><div class="text-xs text-slate-500">${a.text}</div></div></div>`);
            if (card.skills) card.skills.forEach(s => details += createRow(s.label, s.text, s.label.includes('ステージ') ? 'stage-pill' : 'oshi-pill'));
            if (card.tags) details += createRow('タグ', card.tags);
            document.getElementById('modalDetails').innerHTML = details;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); document.body.style.overflow = ''; }
        function toggleMobileFilter() { document.getElementById('filterSidebar').classList.toggle('mobile-open'); document.getElementById('filterOverlay').classList.toggle('active'); }
        function toggleLogic(g) { logicState[g] = (logicState[g] === 'OR') ? 'AND' : 'OR'; const el = document.getElementById(`logic-${g}`); el.innerText = logicState[g]; el.className = `logic-toggle ${logicState[g] === 'OR' ? 'logic-or' : 'logic-and'}`; applyFilters(); }
        function setSearchText(t) { document.getElementById('searchInput').value = t; activeFilters.text = t; closeModal(); applyFilters(); }

        document.getElementById('searchInput').addEventListener('input', e => { activeFilters.text = e.target.value; applyFilters(); });
        document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
            const g = btn.dataset.group; const v = btn.dataset.val;
            if (activeFilters[g].includes(v)) activeFilters[g] = activeFilters[g].filter(x => x !== v); else activeFilters[g].push(v);
            btn.classList.toggle('filter-active'); applyFilters();
        }));
        
        // 色ドットの制御（単一選択）
        document.querySelectorAll('.color-dot').forEach(btn => btn.addEventListener('click', () => {
            const t = btn.dataset.type; const v = btn.dataset.val;
            if (activeFilters[t] === v) activeFilters[t] = '';
            else activeFilters[t] = v;
            document.querySelectorAll(`.color-dot[data-type="${t}"]`).forEach(b => b.classList.remove('ring-4', 'ring-[#5e5a9b]/50'));
            if (activeFilters[t]) btn.classList.add('ring-4', 'ring-[#5e5a9b]/50');
            applyFilters();
        }));

        document.getElementById('resetFilters').addEventListener('click', () => {
            activeFilters = { text: '', category: [], kind: [], subKind: [], color: '', baton: [], tokkou: '' };
            document.getElementById('productSelect').value = '';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
            document.querySelectorAll('.color-dot').forEach(b => b.classList.remove('ring-4', 'ring-[#5e5a9b]/50'));
            document.getElementById('searchInput').value = ''; applyFilters();
        });
        async function init() {
            try { const res = await fetch('./master_cards.json'); allCards = await res.json(); applyFilters(); } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
