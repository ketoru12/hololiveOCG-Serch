<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホロカ検索</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        /* 基本スタイル */
        .label-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; min-width: 110px; text-align: center; flex-shrink: 0; }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .keyword-pill { background-color: #10b981; }
        .oshi-pill { background-color: #ef4444; }
        .stage-pill { background-color: #3b82f6; }
        
        .clickable-name { cursor: pointer; transition: color 0.2s; }
        .clickable-name:hover { color: #4a4682; text-decoration: underline; }
        .non-clickable-name { cursor: default; }

        .tag-item-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .tag-item-pill:hover { background-color: #4a4682; transform: scale(1.05); }
        
        .product-pill { background-color: #6366f1; }
        .extra-pill { background-color: #f59e0b; }
        .kind-pill { background-color: #64748b; }
        .value-box { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a202c; flex: 1; }

        /* ▼ 色アイコン（type / arts）共通 */
        .color-icon { width: 28px; height: 28px; object-fit: contain; }
        .arts-color-icon { width: 22px; height: 22px; object-fit: contain; display: inline-block; vertical-align: middle; }
        /* バトンタッチアイコン */
        .baton-icon { width: 22px; height: 22px; object-fit: contain; display: inline-block; vertical-align: middle; }

        .filter-label { display: block; font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: -0.01em; }

        /* ▼ テキスト系フィルターボタン */
        .filter-btn {
            position: relative;
            transition: all 0.15s ease;
            font-weight: 600;
            color: #475569;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            background: white;
        }
        .filter-btn:hover {
            border-color: #5e5a9b;
            color: #5e5a9b;
            background-color: #f5f3ff;
        }
        .filter-active {
            background-color: #5e5a9b !important;
            color: white !important;
            font-weight: bold;
            border-color: #5e5a9b !important;
            box-shadow: 0 2px 8px rgba(94,90,155,0.35);
            transform: scale(1.05);
        }
        .filter-active::after {
            content: " ✓";
            font-size: 10px;
        }

        /* ▼ 色・特攻ボタン（画像） */
        .color-dot {
            position: relative;
            transition: all 0.15s ease;
            border-radius: 999px;
            cursor: pointer;
        }
        .filter-active-img {
            outline: 3px solid #5e5a9b;
            outline-offset: 3px;
            border-radius: 999px;
            background-color: #ede9fe;
        }
        
        .toggle-switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #5e5a9b; }
        input:checked + .slider:before { transform: translateX(14px); }

        .logic-toggle { font-size: 10px; padding: 1px 6px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .logic-and { background-color: #ef4444; color: white; }
        .logic-or { background-color: #3b82f6; color: white; }

        @media (max-width: 768px) {
            #filterSidebar { position: fixed; bottom: 0; left: 0; right: 0; height: 85vh; transform: translateY(100%); transition: transform 0.3s; z-index: 200; border-radius: 20px 20px 0 0; }
            #filterSidebar.mobile-open { transform: translateY(0); }
            #filterOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; }
            #filterOverlay.active { display: block; }
        }

        #modal { display: none; }
        #modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="filterOverlay" onclick="toggleMobileFilter()"></div>

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <aside id="filterSidebar" class="w-full md:w-80 bg-white border-r flex flex-col shadow-lg z-50 overflow-y-auto">
            <div class="p-4 border-b bg-[#5e5a9b] text-white flex justify-between items-center shrink-0">
                <h1 class="font-bold tracking-wider italic">ホロカ検索</h1>
                <span id="resultCount" class="text-[10px] font-mono bg-white/20 px-2 py-1 rounded">0 枚</span>
            </div>
            
            <div class="p-4 space-y-6">
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">検索ワード</label>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-400">本文を含める</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="searchIncludeText" checked onchange="applyFilters()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <input type="text" id="searchInput" placeholder="名前、タグ、効果..." class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#5e5a9b]/30 outline-none">
                </div>

                <div>
                    <label class="filter-label mb-2">収録</label>
                    <select id="filterProduct" class="w-full border rounded-lg px-3 py-2 text-sm bg-white outline-none">
                        <option value="">すべて</option>
                    </select>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">カードタイプ</label>
                        <div class="logic-toggle logic-or" id="logic-category" onclick="toggleLogic('category')">OR検索</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-3 py-2 text-xs" data-group="category" data-val="ホロメン">ホロメン</button>
                        <button class="filter-btn px-3 py-2 text-xs" data-group="category" data-val="推しホロメン">推し</button>
                        <button class="filter-btn px-3 py-2 text-xs" data-group="category" data-val="サポート">サポート</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-2">属性</label>
                    <div class="grid grid-cols-7 gap-1">
                        <div class="color-dot p-0.5" data-type="color" data-val="赤"><img src="image/Colors/type_red.png" class="color-icon"></div>
                        <div class="color-dot p-0.5" data-type="color" data-val="青"><img src="image/Colors/type_blue.png" class="color-icon"></div>
                        <div class="color-dot p-0.5" data-type="color" data-val="緑"><img src="image/Colors/type_green.png" class="color-icon"></div>
                        <div class="color-dot p-0.5" data-type="color" data-val="黄"><img src="image/Colors/type_yellow.png" class="color-icon"></div>
                        <div class="color-dot p-0.5" data-type="color" data-val="紫"><img src="image/Colors/type_purple.png" class="color-icon"></div>
                        <div class="color-dot p-0.5" data-type="color" data-val="白"><img src="image/Colors/type_white.png" class="color-icon"></div>
                        <div class="color-dot p-0.5" data-type="color" data-val="無"><img src="image/Colors/type_null.png" class="color-icon"></div>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">Bloomレベル</label>
                        <div class="logic-toggle logic-or" id="logic-kind" onclick="toggleLogic('kind')">OR検索</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2.5 py-2 text-xs" data-group="kind" data-val="Spot">Spot</button>
                        <button class="filter-btn px-2.5 py-2 text-xs" data-group="kind" data-val="Debut">Debut</button>
                        <button class="filter-btn px-2.5 py-2 text-xs" data-group="kind" data-val="1st">1st</button>
                        <button class="filter-btn px-2.5 py-2 text-xs" data-group="kind" data-val="2nd">2nd</button>
                        <button class="filter-btn px-2.5 py-2 text-xs" data-group="kind" data-val="Buzz">Buzz</button>
                    </div>
                </div>

                <button id="resetFilters" class="w-full py-3 text-[11px] font-black text-slate-400 hover:text-red-500 border-2 border-dashed rounded-lg">リセット</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 bg-slate-50">
            <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 2xl:grid-cols-8 gap-4"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[300] bg-black/80 items-center justify-center p-4" onclick="closeModal()">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto flex flex-col md:flex-row gap-6 p-6 relative" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-slate-400 text-2xl" onclick="closeModal()">✕</button>
            <div class="w-full md:w-1/3 shrink-0"><img id="modalImg" src="" class="w-full rounded-lg shadow"></div>
            <div class="flex-1">
                <div class="border-b-2 pb-2 mb-4">
                    <h2 id="modalName" class="text-2xl font-bold text-[#5e5a9b]"></h2>
                    <span id="modalId" class="text-sm font-mono text-slate-400"></span>
                </div>
                <div id="modalDetails" class="space-y-2 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        let allCards = [];
        let activeFilters = { text: '', category: [], kind: [], subKind: [], color: '', product: '', baton: [], tokkou: '' };
        let logiceState = { category: 'OR', kind: 'OR', subKind: 'OR' };

        const typeImgMap = { '白': 'image/Colors/type_white.png', '緑': 'image/Colors/type_green.png', '赤': 'image/Colors/type_red.png', '青': 'image/Colors/type_blue.png', '紫': 'image/Colors/type_purple.png', '黄': 'image/Colors/type_yellow.png', '無': 'image/Colors/type_null.png', '◇': 'image/Colors/type_null.png' };
        const artsImgMap = { '白': 'image/Colors/arts_white.png', '緑': 'image/Colors/arts_green.png', '赤': 'image/Colors/arts_red.png', '青': 'image/Colors/arts_blue.png', '紫': 'image/Colors/arts_purple.png', '黄': 'image/Colors/arts_yellow.png', '無': 'image/Colors/arts_null.png', '◇': 'image/Colors/arts_null.png' };

        function toggleLogic(group) {
            const el = document.getElementById(`logic-${group}`);
            logiceState[group] = logiceState[group] === 'OR' ? 'AND' : 'OR';
            el.innerText = logiceState[group] + '検索';
            el.className = `logic-toggle logic-${logiceState[group].toLowerCase()}`;
            applyFilters();
        }

        function applyFilters() {
            let result = allCards;
            const includeText = document.getElementById('searchIncludeText').checked;
            
            if (activeFilters.text) {
                const fuse = new Fuse(allCards, { keys: ['name', 'id', 'tags', 'description'], threshold: 0.3 });
                result = fuse.search(activeFilters.text).map(r => r.item);
            }
            
            if (activeFilters.category.length > 0) {
                result = result.filter(c => logiceState.category === 'OR' ? activeFilters.category.includes(c.category) : activeFilters.category.every(f => c.category === f));
            }

            if (activeFilters.color) {
                result = result.filter(c => {
                    const col = (c.color === '◇' || !c.color || c.color === 'nan') ? '無' : c.color;
                    return col === activeFilters.color;
                });
            }

            if (activeFilters.kind.length > 0) {
                result = result.filter(c => {
                    // Buzz選択時のみ category: "Buzzホロメン" を抽出するよう修正
                    if (activeFilters.kind.includes('Buzz')) {
                        return c.category === 'Buzzホロメン';
                    }
                    return activeFilters.kind.some(k => (c.kind || '').includes(k));
                });
            }

            if (activeFilters.product) result = result.filter(c => (c.products || []).includes(activeFilters.product));
            
            renderCards(result);
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = `${cards.length} 枚`;
            grid.innerHTML = '';
            cards.forEach(card => {
                const div = document.createElement('div');
                div.className = "cursor-pointer hover:-translate-y-1 transition-all border rounded-lg bg-white overflow-hidden shadow-sm";
                div.onclick = () => showDetail(card.id);
                div.innerHTML = `<img src="${(card.img || '').startsWith('/') ? card.img.slice(1) : card.img}" class="w-full h-auto" loading="lazy">`;
                grid.appendChild(div);
            });
        }

        function showDetail(id) {
            const card = allCards.find(c => c.id === id);
            if (!card) return;
            document.getElementById('modalName').innerText = card.name;
            document.getElementById('modalId').innerText = card.id;
            document.getElementById('modalImg').src = (card.img || '').startsWith('/') ? card.img.slice(1) : card.img;
            
            let html = "";
            const row = (lbl, val, cls="") => val && val !== "nan" ? `<div class="flex gap-3"><span class="label-pill ${cls}">${lbl}</span><div class="value-box">${val}</div></div>` : "";
            
            if (card.category !== "サポート") {
                const col = (card.color === '◇' || !card.color) ? '無' : card.color;
                html += `<div class="flex items-center gap-3"><span class="label-pill">属性</span><div class="value-box flex items-center gap-2"><img src="${typeImgMap[col]}" class="color-icon"> ${col}</div></div>`;
            }
            html += row('HP/LIFE', card.value);
            html += row('Bloom', card.kind);
            if (card.description) html += row('効果', card.description);
            if (card.tags) html += row('タグ', card.tags.join('　'));

            document.getElementById('modalDetails').innerHTML = html;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        // 初期化
        document.getElementById('searchInput').addEventListener('input', e => { activeFilters.text = e.target.value; applyFilters(); });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const g = btn.dataset.group, v = btn.dataset.val;
                if (activeFilters[g].includes(v)) activeFilters[g] = activeFilters[g].filter(x => x !== v);
                else activeFilters[g].push(v);
                btn.classList.toggle('filter-active');
                applyFilters();
            });
        });
        document.querySelectorAll('.color-dot').forEach(btn => {
            btn.addEventListener('click', () => {
                const v = btn.dataset.val;
                document.querySelectorAll('.color-dot').forEach(b => b.classList.remove('filter-active-img'));
                if (activeFilters.color === v) activeFilters.color = '';
                else { activeFilters.color = v; btn.classList.add('filter-active-img'); }
                applyFilters();
            });
        });

        async function init() {
            try {
                const res = await fetch('./master_cards.json');
                allCards = await res.json();
                const productSelect = document.getElementById('filterProduct');
                const products = [...new Set(allCards.flatMap(c => c.products || []))].sort();
                products.forEach(p => { const opt = document.createElement('option'); opt.value = opt.textContent = p; productSelect.appendChild(opt); });
                renderCards(allCards);
            } catch (e) { console.error("Load Error", e); }
        }
        init();
    </script>
</body>
</html>
