<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホロカ検索 - 安定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        .label-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; min-width: 110px; text-align: center; flex-shrink: 0; }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .keyword-pill { background-color: #10b981; }
        .oshi-pill { background-color: #ef4444; }
        .stage-pill { background-color: #3b82f6; }
        .tag-item-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .filter-label { display: block; font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .filter-btn { transition: all 0.15s ease; font-weight: 600; color: #475569; border: 1px solid #cbd5e1; min-height: 32px; font-size: 11px; }
        .filter-active { background-color: #5e5a9b !important; color: white !important; border-color: #5e5a9b !important; box-shadow: 0 2px 6px rgba(94,90,155,0.3); }
        .color-dot { cursor: pointer; border: 2px solid transparent; border-radius: 999px; transition: all 0.15s; }
        .filter-active-img { border-color: #5e5a9b; background-color: #ede9fe; box-shadow: 0 0 0 2px #5e5a9b; }
        .color-icon { width: 24px; height: 24px; object-fit: contain; }
        .arts-color-icon { width: 20px; height: 20px; object-fit: contain; display: inline-block; vertical-align: middle; }
        #modal { display: none; }
        #modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <aside id="filterSidebar" class="w-full md:w-80 bg-white border-r flex flex-col shadow-lg z-50 overflow-hidden">
            <div class="p-4 border-b bg-[#5e5a9b] text-white flex justify-between items-center shrink-0">
                <h1 class="font-bold italic">ホロカ検索</h1>
                <span id="resultCount" class="text-xs bg-white/20 px-2 py-1 rounded">0 枚</span>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-5 pb-20">
                <div>
                    <label class="filter-label mb-1">キーワード検索</label>
                    <input type="text" id="searchInput" placeholder="名前、タグ、効果..." class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-[#5e5a9b]/30">
                </div>

                <div>
                    <label class="filter-label mb-1">カードタイプ</label>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="category" data-val="ホロメン">ホロメン</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="category" data-val="推しホロメン">推し</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="category" data-val="サポートカード">サポート</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-1">色</label>
                    <div class="grid grid-cols-7 gap-1">
                        <button class="color-dot p-0.5" data-type="color" data-val="赤"><img src="image/Colors/type_red.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="color" data-val="青"><img src="image/Colors/type_blue.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="color" data-val="緑"><img src="image/Colors/type_green.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="color" data-val="黄"><img src="image/Colors/type_yellow.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="color" data-val="紫"><img src="image/Colors/type_purple.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="color" data-val="白"><img src="image/Colors/type_white.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="color" data-val="無"><img src="image/Colors/type_null.png" class="w-full"></button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-1">特攻</label>
                    <div class="grid grid-cols-7 gap-1">
                        <button class="color-dot p-0.5" data-type="tokkou" data-val="赤"><img src="image/Colors/type_red.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="tokkou" data-val="青"><img src="image/Colors/type_blue.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="tokkou" data-val="緑"><img src="image/Colors/type_green.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="tokkou" data-val="黄"><img src="image/Colors/type_yellow.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="tokkou" data-val="紫"><img src="image/Colors/type_purple.png" class="w-full"></button>
                        <button class="color-dot p-0.5" data-type="tokkou" data-val="白"><img src="image/Colors/type_white.png" class="w-full"></button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-1">Bloomレベル</label>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="kind" data-val="Spot">Spot</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="kind" data-val="Debut">Debut</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="kind" data-val="1st">1st</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="kind" data-val="2nd">2nd</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white font-bold text-purple-600 border-purple-200" data-group="kind" data-val="Buzz">Buzz</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-1">サポート種別</label>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="subKind" data-val="LIMITED">LIMITED</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="subKind" data-val="ツール">ツール</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="subKind" data-val="イベント">イベント</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="subKind" data-val="アイテム">アイテム</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="subKind" data-val="ファン">ファン</button>
                        <button class="filter-btn px-2 py-1 rounded bg-white" data-group="subKind" data-val="マスコット">マスコット</button>
                    </div>
                </div>

                <button id="resetFilters" class="w-full py-3 text-[11px] font-black text-slate-400 hover:text-red-500 border-2 border-dashed rounded-lg">リセット</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 bg-slate-50">
            <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] bg-black/80 items-center justify-center p-4" onclick="closeModal()">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto flex flex-col md:flex-row gap-6 p-6 relative shadow-2xl" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-slate-400 text-2xl" onclick="closeModal()">✕</button>
            <div class="w-full md:w-1/3 shrink-0"><img id="modalImg" src="" class="w-full rounded-lg shadow border"></div>
            <div class="flex-1">
                <div class="flex justify-between items-baseline border-b-2 border-slate-100 pb-2 mb-4">
                    <h2 id="modalName" class="text-xl md:text-2xl font-bold text-[#5e5a9b] cursor-pointer hover:underline" onclick="setSearchText(this.innerText)"></h2>
                    <span id="modalId" class="text-xs font-mono text-slate-400"></span>
                </div>
                <div id="modalDetails" class="space-y-3 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        let allCards = [];
        let activeFilters = { text: '', category: [], kind: [], subKind: [], color: '', product: '', tokkou: '' };

        const typeImgMap = { '赤': 'image/Colors/type_red.png', '青': 'image/Colors/type_blue.png', '緑': 'image/Colors/type_green.png', '黄': 'image/Colors/type_yellow.png', '紫': 'image/Colors/type_purple.png', '白': 'image/Colors/type_white.png', '無': 'image/Colors/type_null.png' };
        const artsImgMap = { '赤': 'image/Colors/arts_red.png', '青': 'image/Colors/arts_blue.png', '緑': 'image/Colors/arts_green.png', '黄': 'image/Colors/arts_yellow.png', '紫': 'image/Colors/arts_purple.png', '白': 'image/Colors/arts_white.png', '無': 'image/Colors/arts_null.png' };

        function setSearchText(text) {
            if (!text) return;
            document.getElementById('searchInput').value = text;
            activeFilters.text = text;
            closeModal();
            applyFilters();
        }

        function applyFilters() {
            let result = [...allCards];

            if (activeFilters.text.trim()) {
                const fuse = new Fuse(result, { keys: ['name', 'id', 'tags', 'description', 'arts.name', 'arts.text'], threshold: 0.3 });
                result = fuse.search(activeFilters.text).map(r => r.item);
            }

            // カードタイプ
            if (activeFilters.category.length > 0) {
                result = result.filter(c => activeFilters.category.includes(c.cardType));
            }

            // 色
            if (activeFilters.color) {
                result = result.filter(c => (c.cardType !== "サポートカード") && (c.color || '無') === activeFilters.color);
            }

            // 特攻
            if (activeFilters.tokkou) {
                result = result.filter(c => c.arts && c.arts.some(a => a.tokkou && a.tokkou.includes(activeFilters.tokkou)));
            }

            // Bloomレベル
            if (activeFilters.kind.length > 0) {
                result = result.filter(c => {
                    const isBuzz = activeFilters.kind.includes('Buzz') && c.cardType === "Buzzホロメン";
                    const isOther = activeFilters.kind.filter(k => k !== 'Buzz').some(k => (c.kind || '').includes(k));
                    return activeFilters.kind.includes('Buzz') ? (isBuzz || isOther) : isOther;
                });
            }

            // サポート種別
            if (activeFilters.subKind.length > 0) {
                result = result.filter(c => activeFilters.subKind.some(k => (c.kind || '').includes(k)));
            }

            renderCards(result);
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = cards.length + " 枚";
            grid.innerHTML = cards.map(c => `<div class="cursor-pointer group" onclick="showDetail('${c.id}')"><img src="${c.img}" class="rounded-md border shadow-sm group-hover:shadow-md" onerror="this.src='image/no-image.png'" loading="lazy"></div>`).join('');
        }

        function showDetail(cardId) {
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;
            document.getElementById('modalName').innerText = card.name;
            document.getElementById('modalImg').src = card.img;
            document.getElementById('modalId').innerText = card.id;

            let details = "";
            const createRow = (label, val, cls = "") => (val && val !== "nan") ? `<div class="flex items-start mb-1 gap-3"><span class="label-pill ${cls}">${label}</span><div class="font-bold flex-1">${val}</div></div>` : "";

            if (card.cardType !== "サポートカード") {
                details += `<div class="flex items-center mb-1 gap-3"><span class="label-pill">色</span><div class="flex items-center gap-2 font-bold"><img src="${typeImgMap[card.color] || typeImgMap['無']}" class="color-icon">${card.color || '無'}</div></div>`;
            }

            if (card.cardType === "ホロメン" || card.cardType === "Buzzホロメン") {
                details += createRow('HP', card.value) + createRow('Bloomレベル', card.cardType === "Buzzホロメン" ? "Buzz" : card.kind);
                if (card.keywordName) details += `<div class="flex items-start mb-1 gap-3"><span class="label-pill keyword-pill">キーワード</span><div class="flex-1 font-bold text-green-700">【${card.keywordName}】<br><span class="text-slate-900 font-normal">${card.keywordEffect}</span></div></div>`;
            } else if (card.cardType === "推しホロメン") {
                details += createRow('LIFE', card.value, 'bg-green-600');
            } else if (card.cardType === "サポートカード") {
                details += createRow('種別', card.kind, 'bg-slate-500');
            }

            if (card.arts) {
                card.arts.forEach(a => {
                    const icons = (a.icons || '').split(',').filter(i => i.trim()).map(i => `<img src="${artsImgMap[i.trim()] || artsImgMap['無']}" class="arts-color-icon">`).join('');
                    details += `<div class="border-t pt-2 mt-2"><div class="flex items-center gap-2 mb-1"><span class="label-pill arts-pill">アーツ</span><div class="flex-1 font-black text-lg">${icons} ${a.name} ${a.damage} ${a.tokkou ? `<span class="text-red-600 text-sm ml-2">${a.tokkou}特攻</span>` : ""}</div></div><p class="bg-slate-50 p-2 rounded text-sm">${a.text}</p></div>`;
                });
            }

            if (card.skills) {
                card.skills.forEach(s => {
                    const cls = s.label === 'ステージスキル' ? 'stage-pill' : (s.label === '推しスキル' ? 'oshi-pill' : '');
                    details += `<div class="border-t pt-2 mt-2"><div class="flex gap-2 mb-1"><span class="label-pill ${cls}">${s.label}</span><span class="font-black text-lg">${s.name || ''}</span></div><p class="bg-slate-50 p-2 rounded text-sm">${s.text}</p></div>`;
                });
            }
            if (card.tags) details += `<div class="flex flex-wrap gap-1 mt-3">${card.tags.map(t => `<span class="tag-item-pill text-xs px-2 py-1 rounded-full" onclick="setSearchText('${t}')">${t}</span>`).join('')}</div>`;

            document.getElementById('modalDetails').innerHTML = details;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        document.getElementById('searchInput').addEventListener('input', e => { activeFilters.text = e.target.value; applyFilters(); });
        document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
            const group = btn.dataset.group, val = btn.dataset.val;
            activeFilters[group] = activeFilters[group].includes(val) ? activeFilters[group].filter(v => v !== val) : [...activeFilters[group], val];
            btn.classList.toggle('filter-active');
            applyFilters();
        }));
        document.querySelectorAll('.color-dot').forEach(btn => btn.addEventListener('click', () => {
            const type = btn.dataset.type, val = btn.dataset.val, isSelected = btn.classList.contains('filter-active-img');
            document.querySelectorAll(`.color-dot[data-type="${type}"]`).forEach(b => b.classList.remove('filter-active-img'));
            if (!isSelected) { btn.classList.add('filter-active-img'); activeFilters[type] = val; }
            else activeFilters[type] = '';
            applyFilters();
        }));
        document.getElementById('resetFilters').addEventListener('click', () => location.reload());

        async function init() {
            try {
                const res = await fetch('./master_cards.json');
                allCards = await res.json();
                renderCards(allCards);
            } catch (e) { console.error("Data Error:", e); }
        }
        init();
    </script>
</body>
</html>
