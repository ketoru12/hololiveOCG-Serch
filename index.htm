<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Holo-Viewer | Support Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        .label-pill {
            background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px;
            font-size: 14px; font-weight: bold; min-width: 115px; text-align: center; flex-shrink: 0;
        }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .keyword-pill { background-color: #10b981; }
        .oshi-pill { background-color: #ef4444; }
        .stage-pill { background-color: #3b82f6; }
        .tag-pill { background-color: #94a3b8; }
        .product-pill { background-color: #6366f1; }
        .extra-pill { background-color: #f59e0b; }
        .support-kind-pill { background-color: #64748b; }
        
        .value-box { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a202c; flex: 1; }
        .badge-base { padding: 2px 8px; border-radius: 4px; font-size: 15px; font-weight: 800; border: 1px solid transparent; }
        
        .color-white { background-color: #f8fafc; color: #475569; border-color: #e2e8f0; }
        .color-green { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .color-red { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .color-blue { background-color: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
        .color-purple { background-color: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
        .color-yellow { background-color: #fefce8; color: #854d0e; border-color: #fef08a; }
        .color-none { background-color: #f1f5f9; color: #334155; border-color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">

    <header class="bg-white border-b sticky top-0 z-50 p-2 shadow-sm">
        <div class="max-w-[1600px] mx-auto flex gap-3 items-center">
            <h1 class="font-bold text-base text-[#5e5a9b]">HOLO-VIEWER</h1>
            <input type="text" id="searchInput" placeholder="検索..." class="flex-1 bg-slate-100 rounded-full px-4 py-1 text-sm outline-none focus:ring-2 focus:ring-[#5e5a9b]/30">
            <div id="resultCount" class="text-xs font-mono text-slate-400">READY</div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-2 md:p-3">
        <div id="cardGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-3"></div>
    </main>

    <script>
        let allCards = [];
        let fuse;
        const colorClassMap = { '白': 'color-white', '緑': 'color-green', '赤': 'color-red', '青': 'color-blue', '紫': 'color-purple', '黄': 'color-yellow', '無': 'color-none' };

        function getTokkouBadgeHtml(text) {
            if (!text || text === "nan" || text === "") return "";
            const match = text.match(/(白|緑|赤|青|紫|黄|無)/);
            return `<span class="badge-base ${match ? colorClassMap[match[1]] : colorClassMap['無']} ml-1">${text}</span>`;
        }

        function renderCostHtml(iconsStr) {
            if (!iconsStr || iconsStr === "nan" || iconsStr === "") return "";
            return iconsStr.split(',').map(c => `<span class="badge-base ${colorClassMap[c.trim()] || colorClassMap['無']} mr-1">${c.trim()}</span>`).join('');
        }

        function createRow(label, value, extraClass = "", forceShow = false) {
            let val = (value === undefined || value === null || String(value) === "nan" || String(value) === "None") ? "" : String(value).trim();
            if (!forceShow && (val === "" || val === "0")) return "";
            const displayValue = (forceShow && (val === "0" || val === "")) ? "" : val;

            return `<div class="flex items-start mb-1 gap-3">
                        <span class="label-pill ${extraClass}">${label}</span>
                        <div class="value-box whitespace-pre-wrap">${displayValue}</div>
                    </div>`;
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = `${cards.length} CARDS`;
            grid.innerHTML = '';

            cards.forEach(card => {
                const wrap = document.createElement('div');
                wrap.className = "bg-white rounded-xl shadow-sm border p-4 flex flex-col md:flex-row gap-4 hover:shadow-md transition-all";
                
                let details = "";
                
                // サポート以外は色を表示
                if (card.category !== "サポート") {
                    details += createRow('色', card.color);
                }
                
                if (card.category === "ホロメン") {
                    details += createRow('HP', card.value);
                    details += createRow('Bloom', card.kind);
                    details += createRow('バトンタッチ', card.baton_touch, '', true);
                    
                    if (card.keywordName) {
                        details += `<div class="flex items-start mb-1 gap-3">
                            <span class="label-pill keyword-pill">キーワード</span>
                            <div class="value-box">
                                <div class="font-black text-slate-800">【${card.keywordName}】</div>
                                <div class="text-slate-600 text-[15px] leading-tight">${card.keywordEffect}</div>
                            </div>
                        </div>`;
                    }
                } else if (card.category === "推しホロメン") {
                    details += createRow('LIFE', card.value, 'bg-green-600');
                } else if (card.category === "サポート") {
                    // サポート専用：種別表示（cardType2の値を並べて表示）
                    details += createRow('種別', card.kind, 'support-kind-pill');
                }

                if (card.arts) {
                    card.arts.forEach(art => {
                        details += `
                            <div class="flex items-start mb-1 gap-3">
                                <span class="label-pill arts-pill">アーツ</span>
                                <div class="value-box">
                                    <div class="flex flex-wrap items-center gap-1 mb-0.5">
                                        <div class="flex">${renderCostHtml(art.icons)}</div>
                                        <span class="font-black text-[18px] text-slate-900">${art.name} ${art.damage}</span>
                                        ${getTokkouBadgeHtml(art.tokkou)}
                                    </div>
                                    <div class="text-slate-600 text-[15px] leading-tight whitespace-pre-wrap">${art.text}</div>
                                </div>
                            </div>`;
                    });
                }

                if (card.skills) {
                    card.skills.forEach(s => {
                        let pillClass = 'oshi-pill';
                        if (s.label === 'ステージスキル') pillClass = 'stage-pill';
                        details += createRow(s.label, s.text, pillClass);
                    });
                }

                // 「効果」を「能力テキスト」に変更
                if (card.description) details += createRow('能力テキスト', card.description);
                if (card.extra) details += createRow('エクストラ', card.extra, 'extra-pill');
                if (card.tags && card.tags.length > 0) details += createRow('タグ', card.tags.join('　'), 'tag-pill');
                if (card.product) details += createRow('収録', card.product, 'product-pill');

                wrap.innerHTML = `
                    <div class="w-full md:w-[180px] shrink-0">
                        <img src="${card.img}" class="rounded border w-full h-auto shadow-sm" loading="lazy">
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-baseline border-b pb-1 mb-2">
                            <h3 class="text-xl font-bold text-[#5e5a9b]">${card.name}</h3>
                            <span class="text-[10px] font-mono text-slate-400">${card.id}</span>
                        </div>
                        ${details}
                    </div>`;
                grid.appendChild(wrap);
            });
        }

        async function init() {
            try {
                const res = await fetch('./master_cards.json');
                allCards = await res.json();
                fuse = new Fuse(allCards, { keys: ['name', 'arts.name', 'tags', 'id'], threshold: 0.3 });
                renderCards(allCards);
            } catch (e) {
                console.error("データ読み込み失敗:", e);
            }
        }
        document.getElementById('searchInput').addEventListener('input', e => {
            renderCards(e.target.value ? fuse.search(e.target.value).map(r => r.item) : allCards);
        });
        init();
    </script>
</body>
</html>
