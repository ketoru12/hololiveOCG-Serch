
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホロカ検索</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        /* 基本スタイル */
        .label-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; min-width: 110px; text-align: center; flex-shrink: 0; }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .keyword-pill { background-color: #10b981; }
        .oshi-pill { background-color: #ef4444; }
        .stage-pill { background-color: #3b82f6; }
        
        .clickable-name { cursor: pointer; transition: color 0.2s; }
        .clickable-name:hover { color: #4a4682; text-decoration: underline; }
        .non-clickable-name { cursor: default; }

        .tag-item-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .tag-item-pill:hover { background-color: #4a4682; transform: scale(1.05); }
        
        .product-pill { background-color: #6366f1; }
        .extra-pill { background-color: #f59e0b; }
        .kind-pill { background-color: #64748b; }
        .value-box { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a202c; flex: 1; }

        /* ▼ 色アイコン（type / arts）共通 */
        .color-icon { width: 28px; height: 28px; object-fit: contain; }
        .arts-color-icon { width: 22px; height: 22px; object-fit: contain; display: inline-block; vertical-align: middle; }
        /* バトンタッチアイコン */
        .baton-icon { width: 22px; height: 22px; object-fit: contain; display: inline-block; vertical-align: middle; }

        .filter-label { display: block; font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: -0.01em; }

        /* ▼ テキスト系フィルターボタン（カードタイプ・Bloom・サポート種別・バトン） */
        .filter-btn {
            position: relative;
            transition: all 0.15s ease;
            font-weight: 600;
            color: #475569;
            border-color: #cbd5e1;
        }
        .filter-btn:hover {
            border-color: #5e5a9b;
            color: #5e5a9b;
            background-color: #f5f3ff;
        }
        .filter-active {
            background-color: #5e5a9b !important;
            color: white !important;
            font-weight: bold;
            border-color: #5e5a9b !important;
            box-shadow: 0 2px 8px rgba(94,90,155,0.35);
            transform: scale(1.05);
        }
        .filter-active::after {
            content: " ✓";
            font-size: 10px;
        }

        /* ▼ 色・特攻ボタン（画像） */
        .color-dot {
            position: relative;
            transition: all 0.15s ease;
            border-radius: 999px;
        }
        .color-dot:hover img {
            transform: scale(1.12);
        }
        .color-dot img {
            transition: transform 0.15s ease;
        }
        .filter-active-img {
            outline: 3px solid #5e5a9b;
            outline-offset: 3px;
            border-radius: 999px;
            background-color: #ede9fe;
        }
        .filter-active-img img {
            transform: scale(1.15) !important;
            filter: drop-shadow(0 0 4px rgba(94,90,155,0.6));
        }

        /* ▼ 収録セレクト選択中 */
        select.filter-select-active {
            border-color: #5e5a9b;
            background-color: #f5f3ff;
            color: #5e5a9b;
            font-weight: bold;
        }
        
        .toggle-switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #5e5a9b; }
        input:checked + .slider:before { transform: translateX(14px); }

        .logic-toggle { font-size: 10px; padding: 1px 6px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .logic-and { background-color: #ef4444; color: white; }
        .logic-or { background-color: #3b82f6; color: white; }

        /* モバイル対応カスタマイズ */
        @media (max-width: 768px) {
            #filterSidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 85vh;
                transform: translateY(100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 200;
                border-radius: 20px 20px 0 0;
                border-right: none;
            }
            #filterSidebar.mobile-open { transform: translateY(0); }
            #filterOverlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.6);
                z-index: 150;
                backdrop-filter: blur(2px);
            }
            #filterOverlay.active { display: block; }
            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 100;
            }
        }

        #modal { display: none; }
        #modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #5e5a9b; border-radius: 10px; }

        /* ==== HC カート ==== */
        #hcBar{background:#1e3a5f;border-left:4px solid #5e5a9b;padding:8px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;font-size:11px;color:white;}
        #hcBar button{border:none;border-radius:6px;padding:4px 8px;font-size:11px;font-weight:bold;cursor:pointer;white-space:nowrap;}
        .hcW{position:relative!important;overflow:visible!important;}
        .hcOv{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;gap:8px;opacity:0;transition:opacity .15s;pointer-events:none;border-radius:6px;z-index:2;}
        .hcW:hover .hcOv{opacity:1;pointer-events:auto;background:rgba(0,0,0,.45);}
        .hcOv button{border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px #0006;}
        .hcBdg{display:none;position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:11px;font-weight:bold;color:white;padding:2px 0;border-radius:0 0 6px 6px;z-index:3;pointer-events:none;}
        #hcDM,#hcEM{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:16px;}
        #hcDM.on,#hcEM.on{display:flex;}
        #hcDB{background:white;border-radius:16px;width:100%;max-width:640px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
        #hcEB{background:#1e1b4b;border-radius:16px;width:100%;max-width:560px;padding:24px;color:white;}
        #hcTA{width:100%;background:#0a0818;color:#a78bfa;border:2px solid #5e5a9b;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;resize:none;box-sizing:border-box;word-break:break-all;line-height:1.5;margin-top:10px;}
        #hcCC{display:flex;align-items:center;gap:8px;margin-top:10px;padding:10px;border-radius:10px;}
        #hcCC.oshi{border:2px solid #10b981;background:#f0fdf4;}
        #hcCC.main{border:2px solid #e2e8f0;background:#f8fafc;}
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="filterOverlay" onclick="toggleMobileFilter()"></div>

    <div class="mobile-nav md:hidden">
        <button onclick="toggleMobileFilter()" class="bg-[#5e5a9b] text-white px-8 py-3 rounded-full shadow-2xl font-bold flex items-center gap-3 active:scale-95 transition-transform">
            <span class="text-lg">🔍</span>
            <span>フィルター</span>
            <span id="mobileResultCount" class="text-xs bg-white/20 px-2 py-0.5 rounded">0 枚</span>
        </button>
    </div>

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <aside id="filterSidebar" class="w-full md:w-80 bg-white border-r flex flex-col shadow-lg z-50">
            <div class="p-4 border-b bg-[#5e5a9b] text-white flex justify-between items-center shrink-0">
                <h1 class="font-bold tracking-wider italic">ホロカ検索</h1>
                <div class="flex items-center gap-3">
                    <span id="resultCount" class="text-[10px] font-mono bg-white/20 px-2 py-1 rounded">0 枚</span>
                    <button class="md:hidden text-xl p-1" onclick="toggleMobileFilter()">✕</button>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
            <div id="hcBar">
                <div style="display:flex;align-items:center;gap:6px;width:100%">
                    <span style="color:#86efac;font-weight:bold;white-space:nowrap">推し：</span>
                    <span id="hcON" style="color:#fde68a;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0">未選択</span>
                    <span style="color:#334155">｜</span>
                    <span style="color:#93c5fd;font-weight:bold;white-space:nowrap">メイン：</span>
                    <span id="hcMC" style="font-weight:900;font-size:13px;color:#86efac;white-space:nowrap">0</span>
                    <span style="color:#94a3b8;white-space:nowrap"> / 50枚</span>
                </div>
                <div style="display:flex;gap:6px;width:100%">
                    <button style="background:#5e5a9b;color:white;flex:1" onclick="hcOpenDeck()">デッキ確認</button>
                    <button style="background:#ea580c;color:white;flex:1" onclick="hcOpenExp()">DECKLOGへ</button>
                </div>
            </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">検索ワード</label>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-400">本文を含める</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="searchIncludeText" checked onchange="applyFilters()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <input type="text" id="searchInput" placeholder="名前、タグ、効果..." 
                        class="w-full border rounded-lg px-3 py-3 md:py-2 text-base md:text-sm focus:ring-2 focus:ring-[#5e5a9b]/30 outline-none transition-all">
                </div>

                <div>
                    <label class="filter-label mb-2">収録</label>
                    <select id="filterProduct" class="w-full border rounded-lg px-3 py-2 text-sm bg-white outline-none focus:ring-2 focus:ring-[#5e5a9b]/30">
                        <option value="">すべて</option>
                    </select>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">カードタイプ</label>
                        <div class="logic-toggle logic-or" id="logic-category" onclick="toggleLogic('category')">OR検索</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-3 py-2 text-xs border rounded bg-white min-h-[40px] md:min-h-0" data-group="category" data-val="ホロメン">ホロメン</button>
                        <button class="filter-btn px-3 py-2 text-xs border rounded bg-white min-h-[40px] md:min-h-0" data-group="category" data-val="推しホロメン">推し</button>
                        <button class="filter-btn px-3 py-2 text-xs border rounded bg-white min-h-[40px] md:min-h-0" data-group="category" data-val="サポート">サポート</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-2">色（ホロメン・推し対象）</label>
                    <div class="grid grid-cols-7 gap-1">
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="color" data-val="赤">
                            <img src="image/Colors/type_red.png" class="color-icon rounded-full" alt="赤">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="color" data-val="青">
                            <img src="image/Colors/type_blue.png" class="color-icon rounded-full" alt="青">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="color" data-val="緑">
                            <img src="image/Colors/type_green.png" class="color-icon rounded-full" alt="緑">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="color" data-val="黄">
                            <img src="image/Colors/type_yellow.png" class="color-icon rounded-full" alt="黄">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="color" data-val="紫">
                            <img src="image/Colors/type_purple.png" class="color-icon rounded-full" alt="紫">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="color" data-val="白">
                            <img src="image/Colors/type_white.png" class="color-icon rounded-full" alt="白">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="color" data-val="無">
                            <img src="image/Colors/type_null.png" class="color-icon rounded-full" alt="無">
                        </button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-2">特攻（対色）</label>
                    <div class="grid grid-cols-7 gap-1">
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="tokkou" data-val="赤">
                            <img src="image/Colors/type_red.png" class="color-icon rounded-full" alt="赤">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="tokkou" data-val="青">
                            <img src="image/Colors/type_blue.png" class="color-icon rounded-full" alt="青">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="tokkou" data-val="緑">
                            <img src="image/Colors/type_green.png" class="color-icon rounded-full" alt="緑">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="tokkou" data-val="黄">
                            <img src="image/Colors/type_yellow.png" class="color-icon rounded-full" alt="黄">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="tokkou" data-val="紫">
                            <img src="image/Colors/type_purple.png" class="color-icon rounded-full" alt="紫">
                        </button>
                        <button class="color-dot p-0.5 rounded-full transition-all" data-type="tokkou" data-val="白">
                            <img src="image/Colors/type_white.png" class="color-icon rounded-full" alt="白">
                        </button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label" style="text-transform: none;">Bloomレベル</label>
                        <div class="logic-toggle logic-or" id="logic-kind" onclick="toggleLogic('kind')">OR検索</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white min-h-[40px]" data-group="kind" data-val="Spot">Spot</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white min-h-[40px]" data-group="kind" data-val="Debut">Debut</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white min-h-[40px]" data-group="kind" data-val="1st">1st</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white min-h-[40px]" data-group="kind" data-val="2nd">2nd</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white min-h-[40px]" data-group="kind" data-val="Buzz">Buzz</button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">サポート種別</label>
                        <div class="logic-toggle logic-or" id="logic-subKind" onclick="toggleLogic('subKind')">OR検索</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white" data-group="subKind" data-val="LIMITED">LIMITED</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white" data-group="subKind" data-val="ツール">ツール</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white" data-group="subKind" data-val="イベント">イベント</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white" data-group="subKind" data-val="アイテム">アイテム</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white" data-group="subKind" data-val="スタッフ">スタッフ</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white" data-group="subKind" data-val="マスコット">マスコット</button>
                        <button class="filter-btn px-2.5 py-2 text-xs border rounded bg-white" data-group="subKind" data-val="ファン">ファン</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-2">バトンタッチ</label>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-4 py-2 text-xs border rounded bg-white" data-group="baton" data-val="0">0</button>
                        <button class="filter-btn px-4 py-2 text-xs border rounded bg-white" data-group="baton" data-val="1">1</button>

                <button id="resetFilters" class="w-full py-3 text-[11px] font-black text-slate-400 hover:text-red-500 border-2 border-dashed rounded-lg transition-colors">フィルターリセット</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 bg-slate-50 pb-32 md:pb-4">
            <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 2xl:grid-cols-8 gap-3 md:gap-4"></div>
        </main>

    <div id="modal" class="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4" onclick="closeModal()">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto flex flex-col md:flex-row gap-6 p-6 relative shadow-2xl" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-2xl z-10" onclick="closeModal()">✕</button>
            <div class="w-full md:w-1/3 shrink-0"><img id="modalImg" src="" class="w-full rounded-lg shadow border"></div>
            <div class="flex-1">
                <div class="flex justify-between items-baseline border-b-2 border-slate-100 pb-2 mb-4">
                    <h2 id="modalName" class="text-xl md:text-2xl font-bold text-[#5e5a9b]"></h2>
                    <span id="modalId" class="text-xs md:text-sm font-mono text-slate-400"></span>
                </div>
                <div id="modalDetails" class="space-y-2 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        let allCards = [];
        let activeFilters = { text: '', category: [], kind: [], subKind: [], color: '', product: '', baton: [], tokkou: '' };
        let logiceState = { category: 'OR', kind: 'OR', subKind: 'OR' };

        const typeImgMap = { '白': 'image/Colors/type_white.png', '緑': 'image/Colors/type_green.png', '赤': 'image/Colors/type_red.png', '青': 'image/Colors/type_blue.png', '紫': 'image/Colors/type_purple.png', '黄': 'image/Colors/type_yellow.png', '無': 'image/Colors/type_null.png', '◇': 'image/Colors/type_null.png' };
        const artsImgMap = { '白': 'image/Colors/arts_white.png', '緑': 'image/Colors/arts_green.png', '赤': 'image/Colors/arts_red.png', '青': 'image/Colors/arts_blue.png', '紫': 'image/Colors/arts_purple.png', '黄': 'image/Colors/arts_yellow.png', '無': 'image/Colors/arts_null.png', '◇': 'image/Colors/arts_null.png' };
        const BATON_ICON = 'image/Colors/arts_null.png';

        function toggleMobileFilter() {
            document.getElementById('filterSidebar').classList.toggle('mobile-open');
            document.getElementById('filterOverlay').classList.toggle('active');
            document.body.style.overflow = document.getElementById('filterOverlay').classList.contains('active') ? 'hidden' : '';
        }

        function toggleLogic(group) {
            const el = document.getElementById(`logic-${group}`);
            if (logiceState[group] === 'OR') {
                logiceState[group] = 'AND';
                el.innerText = 'AND検索';
                el.classList.replace('logic-or', 'logic-and');
            } else {
                logiceState[group] = 'OR';
                el.innerText = 'OR検索';
                el.classList.replace('logic-and', 'logic-or');
            }
            applyFilters();
        }

        function setSearchNameOnly(name) {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = name;
            activeFilters.text = name;
            activeFilters.category = ['ホロメン'];
            document.querySelectorAll('.filter-btn[data-group="category"]').forEach(btn => {
                if (btn.getAttribute('data-val') === 'ホロメン') btn.classList.add('filter-active');
                else btn.classList.remove('filter-active');
            });
            closeModal();
            applyFilters();
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setSearchText(text) {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = text;
            activeFilters.text = text;
            closeModal();
            applyFilters();
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyFilters() {
            let result = allCards;
            const includeText = document.getElementById('searchIncludeText').checked;
            
            if (activeFilters.text) {
                let searchKeys = [{ name: 'name', weight: 1.0 }, { name: 'id', weight: 0.5 }, { name: 'tags', weight: 0.7 }];
                if (includeText) {
                    searchKeys.push({ name: 'description', weight: 0.4 }, { name: 'arts.name', weight: 0.4 }, { name: 'arts.text', weight: 0.4 }, { name: 'skills.text', weight: 0.4 });
                }
                const fuse = new Fuse(allCards, { keys: searchKeys, threshold: 0.3, ignoreLocation: true });
                result = fuse.search(activeFilters.text).map(r => r.item);
            }
            
            if (activeFilters.category.length > 0) {
                result = result.filter(c => logiceState.category === 'OR' ? activeFilters.category.includes(c.category) : activeFilters.category.every(f => c.category === f));
            }

            if (activeFilters.color) {
                result = result.filter(c => {
                    if (c.category !== "ホロメン" && c.category !== "推しホロメン") return false;
                    const cColor = (c.color === '◇' || !c.color || c.color === 'nan') ? '無' : c.color;
                    return cColor === activeFilters.color;
                });
            }

            const checkLogic = (cardValue, filterList, logic) => {
                if (filterList.length === 0) return true;
                const val = String(cardValue);
                return logic === 'OR' ? filterList.some(f => val.includes(f)) : filterList.every(f => val.includes(f));
            };

            if (activeFilters.kind.length > 0) {
                result = result.filter(c => {
                    if (activeFilters.kind.includes('Buzz')) {
                        return c.cardType === 'Buzzホロメン';
                    }
                    return checkLogic(c.kind || '', activeFilters.kind, logiceState.kind);
                });
            }
            if (activeFilters.subKind.length > 0) result = result.filter(c => checkLogic(c.kind || '', activeFilters.subKind, logiceState.subKind));
            
            if (activeFilters.tokkou) {
                result = result.filter(c => c.arts && Array.isArray(c.arts) && c.arts.some(art => art.tokkou && art.tokkou.includes(activeFilters.tokkou)));
            }
            if (activeFilters.baton.length > 0) result = result.filter(c => activeFilters.baton.includes(String(c.baton_touch)));
            if (activeFilters.product) result = result.filter(c => c.products && c.products.includes(activeFilters.product));
            
            renderCards(result);
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            const countText = `${cards.length} 枚`;
            document.getElementById('resultCount').innerText = countText;
            document.getElementById('mobileResultCount').innerText = countText;
            grid.innerHTML = cards.length ? '' : `<div class="col-span-full text-center py-20 text-slate-400">該当するカードがありません</div>`;
            cards.forEach(card => {
                const div = document.createElement('div');
                div.className = "group cursor-pointer hover:-translate-y-1 transition-all";
                div.onclick = () => showDetail(card.id);
                div.innerHTML = `<div class="aspect-[3/4.2] overflow-hidden rounded-md border bg-white shadow-sm group-hover:shadow-lg transition-all"><img src="${(card.img || '').startsWith('/') ? card.img.slice(1) : card.img}" class="w-full h-full object-cover" loading="lazy"></div>`;
                grid.appendChild(div);
            });
        }

        function normalizeColor(c) { return (!c || c === 'nan' || c === '◇') ? '無' : c; }

        function renderArtsIcons(icons) {
            if (!icons) return '';

        }

        function renderBatonIcons(count) {
            const n = parseInt(count, 10);
            if (isNaN(n) || n <= 0) return '<span class="text-slate-400">0</span>';
            return Array(n).fill(`<img src="${BATON_ICON}" class="baton-icon">`).join('');

        function showDetail(cardId) {
            const card = allCards.find(c => c.id === cardId);

            const nameEl = document.getElementById('modalName');
            nameEl.innerText = card.name;
            nameEl.className = card.category === "ホロメン" ? "text-xl md:text-2xl font-bold text-[#5e5a9b] clickable-name" : "text-xl md:text-2xl font-bold text-[#5e5a9b] non-clickable-name";
            nameEl.onclick = card.category === "ホロメン" ? () => setSearchNameOnly(card.name) : null;
            document.getElementById('modalImg').src = (card.img || '').startsWith('/') ? card.img.slice(1) : card.img;
            document.getElementById('modalId').innerText = card.id;
            
            let details = "";
            const createRow = (label, value, extraClass = "") => {
                if (!value || value === "nan" || (label !== 'バトンタッチ' && value === "0")) return "";
                if (label === 'タグ') {
                    const tagsHtml = value.split('　').map(tag => `<span class="tag-item-pill mr-1 mb-1 inline-block" onclick="setSearchText('${tag}'); closeModal();">${tag}</span>`).join('');
                    return `<div class="flex items-start mb-1 gap-3"><span class="label-pill">${label}</span><div class="value-box flex flex-wrap">${tagsHtml}</div></div>`;
                }
                return `<div class="flex items-start mb-1 gap-3"><span class="label-pill ${extraClass}">${label}</span><div class="value-box whitespace-pre-wrap">${value}</div></div>`;
            };

            const createColorRow = (label, colorVal) => {
                const col = normalizeColor(colorVal);
                return `<div class="flex items-center mb-1 gap-3"><span class="label-pill">${label}</span><div class="value-box flex items-center gap-2"><img src="${typeImgMap[col]}" class="color-icon"><span class="font-bold">${col}</span></div></div>`;
            };

            if (card.category !== "サポート") details += createColorRow('色', card.color);
            if (card.category === "ホロメン") {
                details += createRow('HP', card.value);
                details += createRow('Bloom', card.kind);
                details += `<div class="flex items-center mb-1 gap-3"><span class="label-pill">バトンタッチ</span><div class="value-box flex items-center gap-1">${renderBatonIcons(card.baton_touch)}</div></div>`;
                if (card.keywordName) details += `<div class="flex items-start mb-1 gap-3"><span class="label-pill keyword-pill">キーワード</span><div class="value-box"><div class="font-black">【${card.keywordName}】</div><div class="text-slate-600">${card.keywordEffect}</div></div></div>`;
            } else if (card.category === "推しホロメン") {
                details += createRow('LIFE', card.value, 'bg-green-600');
            } else if (card.category === "サポート") {
                details += createRow('種別', card.kind, 'kind-pill');
            }

            if (card.arts) {
                card.arts.forEach(art => {
                    details += `<div class="flex items-start mb-1 gap-3 border-t border-slate-50 pt-2"><span class="label-pill arts-pill">アーツ</span><div class="value-box"><div class="flex items-center gap-1">${renderArtsIcons(art.icons)}<span class="font-black text-lg">${art.name} ${art.damage}</span></div><div class="text-slate-600 text-sm">${art.text}</div></div></div>`;
                });
            }
            if (card.skills) card.skills.forEach(s => details += createRow(s.label, s.text, s.label === 'ステージスキル' ? 'stage-pill' : 'oshi-pill'));
            if (card.description) details += createRow('能力テキスト', card.description);
            if (card.tags && card.tags.length > 0) details += createRow('タグ', card.tags.join('　'));
            if (card.products) details += createRow('収録', card.products.join('　'), 'product-pill');

            document.getElementById('modalDetails').innerHTML = details;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

                keys.forEach(function(id){
                    var c=HC.cart[id],row=document.createElement('div');
                    row.style.cssText='display:flex;align-items:center;gap:10px;padding:6px 4px;border-bottom:1px solid #f1f5f9;';
                    row.innerHTML='<img src="'+c.img+'" style="width:36px;height:50px;object-fit:cover;border-radius:4px;flex-shrink:0"><div style="flex:1;min-width:0"><div style="font-weight:bold;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.name+'</div><div style="color:#94a3b8;font-size:11px">'+id+'</div></div>';
                    var ct=document.createElement('div');ct.style.cssText='display:flex;align-items:center;gap:6px;';
                    var mi2=document.createElement('button');mi2.textContent='-';mi2.style.cssText='background:#e2e8f0;border:none;border-radius:4px;width:24px;height:24px;font-size:15px;font-weight:bold;cursor:pointer;';mi2.dataset.id=id;
                    mi2.onclick=function(){HC.dec(this.dataset.id);hcOpenDeck();};
                    var qs=document.createElement('span');qs.style.cssText='font-weight:bold;font-size:14px;min-width:20px;text-align:center;color:'+(c.qty>=HC.MAX_PER?'#f59e0b':'#1e293b');qs.textContent=c.qty;
                    var atL=c.qty>=HC.MAX_PER||t>=HC.MAX_TOTAL;
                    var pl2=document.createElement('button');pl2.textContent='+';pl2.dataset.id=id;
                    pl2.style.cssText='background:'+(atL?'#e2e8f0':'#5e5a9b')+';color:'+(atL?'#94a3b8':'white')+';border:none;border-radius:4px;width:24px;height:24px;font-size:15px;font-weight:bold;cursor:'+(atL?'not-allowed':'pointer')+';';
                    pl2.onclick=function(){HC.inc(this.dataset.id);hcOpenDeck();};
                    ct.appendChild(mi2);ct.appendChild(qs);ct.appendChild(pl2);row.appendChild(ct);ms.appendChild(row);
                });
            }
            list.appendChild(ms);
            document.getElementById('hcDM').classList.add('on');
        }
        function hcCloseDeck(){document.getElementById('hcDM').classList.remove('on');}
        function hcClear(){
            if(!confirm('デッキをすべてクリアしますか？'))return;
            HC.cart={};HC.oshi=null;HC.updateBar();HC.updateBadges();hcOpenDeck();
        }
        function hcOpenExp(){
            if(!Object.keys(HC.cart).length&&!HC.oshi){alert('カートが空です');return;}
            var oshi=HC.oshi;
            var main=Object.keys(HC.cart).map(function(id){return{id:id,count:HC.cart[id].qty};});
            var deckData={oshi:oshi?{id:oshi.id,count:1}:null,main:main};

            // Chrome拡張機能経由で自動実行
            // window.postMessageでindex.htmから拡張機能のcontent_scriptへ送信
            if(typeof chrome!=='undefined'&&chrome.runtime&&chrome.runtime.sendMessage){
                try{
                    chrome.runtime.sendMessage(
                        {type:'SEND_TO_DECKLOG',data:deckData},
                        function(res){
                            if(chrome.runtime.lastError){
                                hcOpenExpFallback(deckData);
                            }
                        }
                    );
                    return;
                }catch(e){}
            }
            hcOpenExpFallback(deckData);
        }
        function hcOpenExpFallback(deckData){
            var ds=JSON.stringify(deckData);
            var code=HC_TPL.replace('__DATA__',ds);
            window.open('https://decklog.bushiroad.com/create?c=9','_blank');
            document.getElementById('hcTA').value=code;
            document.getElementById('hcEM').classList.add('on');
            setTimeout(function(){var ta=document.getElementById('hcTA');ta.focus();ta.select();},300);
        }

        function hcCloseExp(){document.getElementById('hcEM').classList.remove('on');}

        (function(){
            fetch('./master_cards.json')
                .then(function(r){return r.json();})
                .then(function(d){
                    hcCards=d;
                    hcPatch();
                    new MutationObserver(function(){setTimeout(hcPatch,50);})
                        .observe(document.getElementById('cardGrid'),{childList:true});
                });
        })();

    </script>

<div id="hcDM" onclick="if(event.target===this)hcCloseDeck()">
  <div id="hcDB">
    <div style="padding:14px 18px;background:#5e5a9b;color:white;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <span style="font-weight:bold;font-size:15px">デッキ確認2</span>
      <span id="hcDBg" style="font-size:12px;background:rgba(255,255,255,.2);border-radius:999px;padding:2px 10px"></span>
      <div style="display:flex;gap:8px">
        <button onclick="hcClear()" style="background:#ef4444;color:white;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer">クリア</button>
        <button onclick="hcCloseDeck()" style="background:none;color:white;border:none;font-size:18px;cursor:pointer">✕</button>
      </div>
    </div>
    <div id="hcDL" style="overflow-y:auto;flex:1;padding:12px"></div>
  </div>
</div>
<div id="hcEM" onclick="if(event.target===this)hcCloseExp()">
  <div id="hcEB">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-weight:bold;font-size:16px">DECKLOGへ送る</span>
      <button onclick="hcCloseExp()" style="background:none;color:#94a3b8;border:none;font-size:20px;cursor:pointer">✕</button>
    </div>
    <div style="font-size:13px;color:#94a3b8;line-height:2">
      ① DECKLOGが自動で開きます<br>
      ② 下のコードをコピー（クリック→Ctrl+A→Ctrl+C）<br>
      ③ DECKLOGの <b style="color:#a78bfa">F12 → コンソール</b> に貼り付けてEnter<br>
      <span style="font-size:11px;color:#475569">※ スタンダード選択・カード追加まで自動実行されます</span>
    </div>
    <textarea id="hcTA" rows="5" readonly onclick="this.focus();this.select()" onfocus="this.select()"></textarea>
  </div>
</div>
</body>
</html>
