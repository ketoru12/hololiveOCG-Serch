<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホロカ検索 & デッキ構築連携</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        /* 既存のスタイルを継承 */
        .label-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; min-width: 110px; text-align: center; flex-shrink: 0; }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .tag-item-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .filter-label { display: block; font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .filter-active { background-color: #5e5a9b !important; color: white !important; }
        
        /* モバイル対応スタイル */
        @media (max-width: 768px) {
            #filterSidebar { position: fixed; bottom: 0; left: 0; right: 0; height: 85vh; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; border-radius: 20px 20px 0 0; }
            #filterSidebar.mobile-open { transform: translateY(0); }
            #filterOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; backdrop-filter: blur(2px); }
            #filterOverlay.active { display: block; }
            .mobile-nav { display: flex; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; width: 90%; justify-content: center; gap: 10px; }
        }

        #modal { display: none; }
        #modal.active { display: flex; }
        
        /* デッキ操作ボタン用 */
        .btn-deck { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .btn-deck:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="filterOverlay" onclick="toggleMobileFilter()"></div>

    <div class="mobile-nav md:hidden">
        <button onclick="toggleMobileFilter()" class="bg-[#5e5a9b] text-white px-5 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2">
            <span>🔍 検索</span>
        </button>
        <button onclick="exportToDeckLog()" class="bg-red-600 text-white px-5 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2">
            <span>🚀 送信</span>
            <span id="deckCountMobile" class="bg-white/20 px-2 py-0.5 rounded text-xs">0</span>
        </button>
    </div>

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <aside id="filterSidebar" class="w-full md:w-80 bg-white border-r flex flex-col shadow-lg z-50">
            <div class="p-4 border-b bg-[#5e5a9b] text-white flex justify-between items-center">
                <h1 class="font-bold italic">ホロカ構築</h1>
                <div class="flex items-center gap-2">
                    <span id="resultCount" class="text-[10px] bg-white/20 px-2 py-1 rounded">0 枚</span>
                    <button class="md:hidden" onclick="toggleMobileFilter()">✕</button>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                <div>
                    <label class="filter-label mb-2">検索ワード</label>
                    <input type="text" id="searchInput" class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-[#5e5a9b]/30">
                </div>
                
                <div class="pt-4 border-t">
                    <button onclick="exportToDeckLog()" class="w-full py-3 bg-red-600 text-white rounded-lg font-bold shadow hover:bg-red-700 transition-colors flex justify-center items-center gap-2">
                        <span>DECK LOGへ送信</span>
                        <span id="deckCountSide" class="bg-black/20 px-2 py-0.5 rounded text-xs">0</span>
                    </button>
                    <p class="text-[10px] text-slate-400 mt-2 text-center">※外部サイト（ブシロード）へ移動します</p>
                </div>

                <button id="resetFilters" class="w-full py-2 text-[11px] font-bold text-slate-400 border-2 border-dashed rounded-lg mt-4">リセット</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 bg-slate-50 pb-24 md:pb-4">
            <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] bg-black/80 items-center justify-center p-4" onclick="closeModal()">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto flex flex-col md:flex-row gap-6 p-6 relative" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-2xl" onclick="closeModal()">✕</button>
            <div class="w-full md:w-1/3">
                <img id="modalImg" src="" class="w-full rounded-lg shadow">
                <div class="mt-6 p-4 bg-slate-50 rounded-2xl border border-slate-200">
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold text-sm text-slate-500">デッキ登録枚数</span>
                        <span id="modalCardIdDisplay" class="text-[10px] font-mono text-slate-400"></span>
                    </div>
                    <div class="flex items-center justify-between gap-4">
                        <button id="btnMinus" class="w-12 h-12 bg-white rounded-full shadow-sm border text-2xl font-bold flex items-center justify-center btn-deck">-</button>
                        <span id="modalCardCount" class="text-3xl font-black text-[#5e5a9b]">0</span>
                        <button id="btnPlus" class="w-12 h-12 bg-[#5e5a9b] text-white rounded-full shadow-lg text-2xl font-bold flex items-center justify-center btn-deck">+</button>
                    </div>
                    <p class="text-[10px] text-center mt-3 text-slate-400">※最大4枚（推し・旗は1枚まで）</p>
                </div>
            </div>
            <div class="flex-1">
                <h2 id="modalName" class="text-2xl font-bold text-[#5e5a9b] mb-4"></h2>
                <div id="modalDetails" class="space-y-2 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        let allCards = [];
        let myDeck = JSON.parse(localStorage.getItem('holoca_deck_v1') || '{}');
        let activeFilters = { text: '', category: [], kind: [], subKind: [], color: '', product: '', baton: [], tokkou: '' };

        // デッキ管理
        function updateDeck(cardId, delta) {
            const card = allCards.find(c => c.id === cardId);
            const current = myDeck[cardId] || 0;
            
            // ルール上の制限（推し・旗は1枚、他は4枚など。簡易的に4枚制限）
            const maxLimit = (card && (card.category === '推しホロメン' || card.id.includes('FLAG'))) ? 1 : 4;
            const next = Math.max(0, Math.min(maxLimit, current + delta));
            
            if (next === 0) delete myDeck[cardId];
            else myDeck[cardId] = next;
            
            localStorage.setItem('holoca_deck_v1', JSON.stringify(myDeck));
            updateDeckUI(cardId);
        }

        function updateDeckUI(cardId = null) {
            const total = Object.values(myDeck).reduce((a, b) => a + b, 0);
            document.getElementById('deckCountSide').innerText = total;
            document.getElementById('deckCountMobile').innerText = total;
            
            if (cardId && document.getElementById('modalCardCount')) {
                document.getElementById('modalCardCount').innerText = myDeck[cardId] || 0;
            }
        }

        // DECK LOG 連携
        function exportToDeckLog() {
            const entries = Object.entries(myDeck);
            if (entries.length === 0) return alert("デッキが空です。カードを選んでください。");

            // URLパラメータ構築
            const items = entries.map(([id, count]) => ({ "id": id, "count": count }));
            const params = new URLSearchParams({
                c: "9", // ホロカカテゴリ
                l: "ja",
                items: JSON.stringify(items)
            });

            const targetUrl = `https://decklog.bushiroad.com/create?${params.toString()}`;
            
            if (confirm(`合計 ${Object.values(myDeck).reduce((a,b)=>a+b,0)} 枚のデータを送信しますか？`)) {
                window.open(targetUrl, '_blank');
            }
        }

        // 既存の基本機能（一部抜粋）
        function toggleMobileFilter() {
            document.getElementById('filterSidebar').classList.toggle('mobile-open');
            document.getElementById('filterOverlay').classList.toggle('active');
        }

        function showDetail(cardId) {
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;

            document.getElementById('modalImg').src = card.img;
            document.getElementById('modalName').innerText = card.name;
            document.getElementById('modalCardIdDisplay').innerText = card.id;
            document.getElementById('modalCardCount').innerText = myDeck[cardId] || 0;

            // ボタンイベントの再割り当て
            document.getElementById('btnMinus').onclick = () => updateDeck(card.id, -1);
            document.getElementById('btnPlus').onclick = () => updateDeck(card.id, 1);

            // 詳細表示ロジック（中略：以前のコードと同様）
            document.getElementById('modalDetails').innerHTML = `<div class="p-4 bg-slate-50 rounded">ID: ${card.id}<br>タイプ: ${card.category}</div>`;
            
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); document.body.style.overflow = ''; }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = cards.length + " 枚";
            grid.innerHTML = cards.map(card => `
                <div class="relative group cursor-pointer" onclick="showDetail('${card.id}')">
                    <img src="${card.img}" class="rounded-md shadow-sm group-hover:shadow-md transition-all">
                    ${myDeck[card.id] ? `<div class="absolute top-1 right-1 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-lg">${myDeck[card.id]}</div>` : ''}
                </div>
            `).join('');
        }

        // 初期化
        async function init() {
            try {
                // master_cards.json を読み込み
                const res = await fetch('./master_cards.json');
                allCards = await res.json();
                updateDeckUI();
                renderCards(allCards);
            } catch (e) { console.error("Load Error", e); }
        }
        
        document.getElementById('searchInput').addEventListener('input', e => {
            const fuse = new Fuse(allCards, { keys: ['name', 'id', 'tags'], threshold: 0.3 });
            const result = e.target.value ? fuse.search(e.target.value).map(r => r.item) : allCards;
            renderCards(result);
        });

        init();
    </script>
</body>
</html>
