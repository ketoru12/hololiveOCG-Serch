<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hololive CG Viewer - Data Rich Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        /* スキルテキストが長すぎる場合に高さを揃えるための設定 */
        .description-box {
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 5.5rem;
        }
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-[1600px] mx-auto px-4 py-3 flex flex-col md:flex-row gap-4 items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-black">H</div>
                <h1 class="font-bold tracking-tighter text-lg">HOLO-VIEWER</h1>
            </div>
            
            <div class="flex-1 w-full flex gap-2">
                <input type="text" id="searchInput" placeholder="カード名、スキル内容、#タグ、型番で検索..." 
                    class="w-full bg-slate-800 border-none rounded-lg px-4 py-2 text-sm text-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div id="resultCount" class="text-[10px] font-mono bg-slate-800 px-3 py-1.5 rounded-md text-slate-400 border border-slate-700">
                LOADING DATA...
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4">
        <div id="cardGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
            </div>

        <div id="noResult" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
            <p class="text-xl font-bold">カードが見つかりません</p>
            <p class="text-sm">キーワードを変えてみてください</p>
        </div>
    </main>

    <script>
        let allCards = [];
        let fuse;

        async function init() {
            try {
                const res = await fetch('./master_cards.json');
                if (!res.ok) throw new Error("JSON読み込み失敗");
                allCards = await res.json();
                
                // 検索の重み付け設定
                fuse = new Fuse(allCards, {
                    keys: [
                        { name: 'name', weight: 2 },
                        { name: 'description', weight: 1 },
                        { name: 'id', weight: 1.5 },
                        { name: 'tags', weight: 1 }
                    ],
                    threshold: 0.3
                });

                render(allCards);
            } catch (e) {
                console.error(e);
                document.getElementById('resultCount').innerText = "ERROR";
            }
        }

        function render(cards) {
            const grid = document.getElementById('cardGrid');
            const noResult = document.getElementById('noResult');
            document.getElementById('resultCount').innerText = `${cards.length.toLocaleString()} CARDS FOUND`;
            
            grid.innerHTML = '';
            if (cards.length === 0) {
                noResult.classList.remove('hidden');
                return;
            }
            noResult.classList.add('hidden');

            cards.forEach(card => {
                const wrap = document.createElement('div');
                // カード全体の枠
                wrap.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col hover:shadow-md transition-all";
                
                // 属性カラーの設定
                const colorMap = {
                    '白': 'border-t-[6px] border-slate-400',
                    '緑': 'border-t-[6px] border-green-500',
                    '赤': 'border-t-[6px] border-red-500',
                    '青': 'border-t-[6px] border-blue-500',
                    '紫': 'border-t-[6px] border-purple-500',
                    '黄': 'border-t-[6px] border-yellow-400'
                };
                wrap.classList.add(colorMap[card.color] || 'border-t-[6px] border-slate-200');

                // カテゴリ別のステータス表示ロジック
                let statsSection = "";
                let descriptionSection = "";

                if (card.category === "ホロメン") {
                    statsSection = `
                        <div class="grid grid-cols-3 gap-2 mb-3">
                            <div class="bg-slate-50 p-1.5 rounded text-center">
                                <span class="block text-[8px] text-slate-400 font-bold uppercase text-center">HP</span>
                                <span class="text-xs font-black text-red-600">${card.value}</span>
                            </div>
                            <div class="bg-slate-50 p-1.5 rounded text-center">
                                <span class="block text-[8px] text-slate-400 font-bold uppercase text-center">Bloom</span>
                                <span class="text-[10px] font-bold">${card.kind}</span>
                            </div>
                            <div class="bg-slate-50 p-1.5 rounded text-center">
                                <span class="block text-[8px] text-slate-400 font-bold uppercase text-center">Baton</span>
                                <span class="text-xs font-bold">${card.baton}</span>
                            </div>
                        </div>`;
                    descriptionSection = `
                        <div class="description-box text-[10px] text-slate-600 leading-relaxed whitespace-pre-wrap">
                            <span class="font-bold text-blue-600">【アーツ】</span>${card.description}
                        </div>`;
                } else if (card.category === "推しホロメン") {
                    statsSection = `
                        <div class="grid grid-cols-1 mb-3">
                            <div class="bg-green-50 p-1.5 rounded flex justify-between items-center px-4">
                                <span class="text-[8px] text-green-600 font-bold uppercase">LIFE</span>
                                <span class="text-sm font-black text-green-700">${card.value}</span>
                            </div>
                        </div>`;
                    descriptionSection = `
                        <div class="description-box text-[9px] text-slate-600 leading-tight space-y-1 overflow-y-auto">
                            <p><span class="font-bold text-green-600">【推し】</span>${card.oshiSkill || '-'}</p>
                            <p><span class="font-bold text-orange-600">【SP】</span>${card.spOshiSkill || '-'}</p>
                            <p><span class="font-bold text-blue-600">【Stage】</span>${card.stageSkill || '-'}</p>
                        </div>`;
                } else {
                    // サポートカード
                    statsSection = `
                        <div class="mb-3">
                            <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] font-bold">${card.kind}</span>
                        </div>`;
                    descriptionSection = `
                        <div class="description-box text-[10px] text-slate-600 leading-relaxed italic">
                            ${card.description}
                        </div>`;
                }

                wrap.innerHTML = `
                    <div class="flex h-full">
                        <div class="w-1/3 min-w-[120px] relative bg-slate-100 border-r border-slate-100">
                            <img src="${card.img}" class="absolute top-0 left-0 w-full h-full object-cover" loading="lazy">
                        </div>
                        
                        <div class="flex-1 p-3 flex flex-col justify-between bg-white">
                            <div>
                                <div class="flex justify-between items-start mb-1">
                                    <span class="text-[9px] font-mono text-slate-400">${card.id}</span>
                                    <span class="text-[8px] font-bold text-slate-300">${card.color}</span>
                                </div>
                                <h3 class="font-black text-xs text-slate-800 mb-2 leading-tight">${card.name}</h3>
                                
                                ${statsSection}
                                ${descriptionSection}
                            </div>

                            <div class="mt-3 pt-2 border-t border-slate-50 flex justify-between items-end">
                                <div class="flex flex-wrap gap-1">
                                    ${card.tags.slice(0, 2).map(t => `<span class="text-[8px] text-blue-400 font-bold">${t}</span>`).join('')}
                                </div>
                                <span class="text-[8px] font-black text-slate-200 uppercase">${card.category}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(wrap);
            });
        }

        // 検索入力の監視
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value;
            const res = val ? fuse.search(val).map(r => r.item) : allCards;
            render(res);
        });

        init();
    </script>
</body>
</html>
