<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホロカ構築DB - プロ仕様</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        /* --- 以前の高度なスタイルをすべて継承 --- */
        .label-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; min-width: 110px; text-align: center; flex-shrink: 0; }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .keyword-pill { background-color: #10b981; }
        .oshi-pill { background-color: #ef4444; }
        .stage-pill { background-color: #3b82f6; }
        .tag-item-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .product-pill { background-color: #6366f1; }
        .kind-pill { background-color: #64748b; }
        .value-box { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a202c; flex: 1; }
        
        .badge-base { padding: 2px 8px; border-radius: 4px; font-size: 15px; font-weight: 800; border: 1px solid transparent; }
        .color-white { background-color: #f8fafc; color: #475569; border-color: #e2e8f0; }
        .color-green { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .color-red { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .color-blue { background-color: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
        .color-purple { background-color: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
        .color-yellow { background-color: #fefce8; color: #854d0e; border-color: #fef08a; }
        .color-none { background-color: #f1f5f9; color: #334155; border-color: #cbd5e1; }

        .filter-label { display: block; font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: -0.01em; }
        .filter-active { background-color: #5e5a9b !important; color: white !important; font-weight: bold; border-color: #5e5a9b !important; }
        
        .toggle-switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #5e5a9b; }
        input:checked + .slider:before { transform: translateX(14px); }

        .logic-toggle { font-size: 10px; padding: 1px 6px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .logic-and { background-color: #ef4444; color: white; }
        .logic-or { background-color: #3b82f6; color: white; }

        /* モバイル対応 */
        @media (max-width: 768px) {
            #filterSidebar { position: fixed; bottom: 0; left: 0; right: 0; height: 85vh; transform: translateY(100%); transition: transform 0.3s ease-in-out; z-index: 200; border-radius: 20px 20px 0 0; border-right: none; }
            #filterSidebar.mobile-open { transform: translateY(0); }
            #filterOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; backdrop-filter: blur(2px); }
            #filterOverlay.active { display: block; }
            .mobile-nav { display: flex; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 100; gap: 10px; width: 90%; justify-content: center; }
        }

        #modal { display: none; }
        #modal.active { display: flex; }
        .btn-deck-op { transition: all 0.1s; cursor: pointer; }
        .btn-deck-op:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="filterOverlay" onclick="toggleMobileFilter()"></div>

    <div class="mobile-nav md:hidden">
        <button onclick="toggleMobileFilter()" class="bg-[#5e5a9b] text-white px-6 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2">
            <span>🔍 フィルター</span>
        </button>
        <button onclick="exportToDeckLog()" class="bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2">
            <span>🚀 送信</span>
            <span id="deckCountMobile" class="bg-white/20 px-2 py-0.5 rounded text-xs">0</span>
        </button>
    </div>

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <aside id="filterSidebar" class="w-full md:w-80 bg-white border-r flex flex-col shadow-lg z-50">
            <div class="p-4 border-b bg-[#5e5a9b] text-white flex justify-between items-center shrink-0">
                <h1 class="font-bold italic">ホロカ検索 & 構築</h1>
                <div class="flex items-center gap-2">
                    <span id="resultCount" class="text-[10px] bg-white/20 px-2 py-1 rounded">0 枚</span>
                    <button class="md:hidden" onclick="toggleMobileFilter()">✕</button>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                <div class="p-4 bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                    <button onclick="exportToDeckLog()" class="w-full py-3 bg-red-600 text-white rounded-lg font-bold shadow hover:bg-red-700 transition-colors flex justify-center items-center gap-2">
                        <span>DECK LOGへ送信</span>
                        <span id="deckCountSide" class="bg-black/20 px-2 py-0.5 rounded text-xs">0</span>
                    </button>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">検索ワード</label>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-400">本文込</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="searchIncludeText" checked onchange="applyFilters()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <input type="text" id="searchInput" placeholder="名前、タグ、効果..." class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#5e5a9b]/30 outline-none">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">カードタイプ</label>
                        <div class="logic-toggle logic-or" id="logic-category" onclick="toggleLogic('category')">OR</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="category" data-val="ホロメン">ホロメン</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="category" data-val="推しホロメン">推し</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="category" data-val="サポート">サポート</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-2">色</label>
                    <div class="grid grid-cols-7 gap-1">
                        <button class="color-dot aspect-square rounded-full border bg-red-500" data-type="color" data-val="赤"></button>
                        <button class="color-dot aspect-square rounded-full border bg-blue-500" data-type="color" data-val="青"></button>
                        <button class="color-dot aspect-square rounded-full border bg-green-500" data-type="color" data-val="緑"></button>
                        <button class="color-dot aspect-square rounded-full border bg-yellow-400" data-type="color" data-val="黄"></button>
                        <button class="color-dot aspect-square rounded-full border bg-purple-500" data-type="color" data-val="紫"></button>
                        <button class="color-dot aspect-square rounded-full border bg-white shadow-inner" data-type="color" data-val="白"></button>
                        <button class="color-dot aspect-square rounded-full border bg-slate-400" data-type="color" data-val="無"></button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-2">特攻（対色）</label>
                    <div class="grid grid-cols-7 gap-1">
                        <button class="color-dot aspect-square rounded-full border bg-red-500" data-type="tokkou" data-val="赤"></button>
                        <button class="color-dot aspect-square rounded-full border bg-blue-500" data-type="tokkou" data-val="青"></button>
                        <button class="color-dot aspect-square rounded-full border bg-green-500" data-type="tokkou" data-val="緑"></button>
                        <button class="color-dot aspect-square rounded-full border bg-yellow-400" data-type="tokkou" data-val="黄"></button>
                        <button class="color-dot aspect-square rounded-full border bg-purple-500" data-type="tokkou" data-val="紫"></button>
                        <button class="color-dot aspect-square rounded-full border bg-white shadow-inner" data-type="tokkou" data-val="白"></button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="filter-label">Bloomレベル</label>
                        <div class="logic-toggle logic-or" id="logic-kind" onclick="toggleLogic('kind')">OR</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2 py-1 text-xs border rounded bg-white" data-group="kind" data-val="Spot">Spot</button>
                        <button class="filter-btn px-2 py-1 text-xs border rounded bg-white" data-group="kind" data-val="Debut">Debut</button>
                        <button class="filter-btn px-2 py-1 text-xs border rounded bg-white" data-group="kind" data-val="1st">1st</button>
                        <button class="filter-btn px-2 py-1 text-xs border rounded bg-white" data-group="kind" data-val="2nd">2nd</button>
                    </div>
                </div>

                <div>
                    <label class="filter-label mb-2">バトンタッチ</label>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-3 py-1 text-xs border rounded bg-white" data-group="baton" data-val="0">0</button>
                        <button class="filter-btn px-3 py-1 text-xs border rounded bg-white" data-group="baton" data-val="1">1</button>
                        <button class="filter-btn px-3 py-1 text-xs border rounded bg-white" data-group="baton" data-val="2">2</button>
                    </div>
                </div>

                <button id="resetFilters" class="w-full py-2 text-[10px] font-black text-slate-400 hover:text-red-500 border border-dashed rounded-lg">リセット</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 bg-slate-50 pb-24 md:pb-4">
            <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3 md:gap-4"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4" onclick="closeModal()">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto flex flex-col md:flex-row gap-6 p-6 relative shadow-2xl" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-slate-400 text-2xl" onclick="closeModal()">✕</button>
            
            <div class="w-full md:w-1/3 shrink-0">
                <img id="modalImg" src="" class="w-full rounded-lg shadow border">
                <div class="mt-4 p-4 bg-slate-100 rounded-xl">
                    <div class="flex justify-between items-center mb-2 text-xs font-bold text-slate-500">
                        <span>デッキ登録枚数</span>
                        <span id="modalIdDisplay" class="font-mono"></span>
                    </div>
                    <div class="flex items-center justify-between gap-4">
                        <button id="btnMinus" class="w-10 h-10 bg-white rounded-full border btn-deck-op text-xl font-bold flex items-center justify-center">-</button>
                        <span id="modalCardCount" class="text-3xl font-black text-[#5e5a9b]">0</span>
                        <button id="btnPlus" class="w-10 h-10 bg-[#5e5a9b] text-white rounded-full btn-deck-op text-xl font-bold flex items-center justify-center">+</button>
                    </div>
                </div>
            </div>

            <div class="flex-1">
                <div class="border-b-2 border-slate-100 pb-2 mb-4">
                    <h2 id="modalName" class="text-2xl font-bold text-[#5e5a9b]"></h2>
                </div>
                <div id="modalDetails" class="space-y-2 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        let allCards = [];
        let myDeck = JSON.parse(localStorage.getItem('holoca_deck_v2') || '{}');
        let activeFilters = { text: '', category: [], kind: [], subKind: [], color: '', product: '', baton: [], tokkou: '' };
        let logicState = { category: 'OR', kind: 'OR', subKind: 'OR' };

        const colorClassMap = { '白': 'color-white', '緑': 'color-green', '赤': 'color-red', '青': 'color-blue', '紫': 'color-purple', '黄': 'color-yellow', '無': 'color-none', '◇': 'color-none' };

        // デッキロジック
        function updateDeck(cardId, delta) {
            const card = allCards.find(c => c.id === cardId);
            const current = myDeck[cardId] || 0;
            const max = (card && (card.category === '推しホロメン' || card.id.includes('FLAG'))) ? 1 : 4;
            const next = Math.max(0, Math.min(max, current + delta));
            
            if (next === 0) delete myDeck[cardId];
            else myDeck[cardId] = next;
            
            localStorage.setItem('holoca_deck_v2', JSON.stringify(myDeck));
            updateUI(cardId);
        }

        function updateUI(targetId = null) {
            const total = Object.values(myDeck).reduce((a, b) => a + b, 0);
            document.getElementById('deckCountSide').innerText = total;
            document.getElementById('deckCountMobile').innerText = total;
            if (targetId && document.getElementById('modalCardCount')) {
                document.getElementById('modalCardCount').innerText = myDeck[targetId] || 0;
            }
            renderCards(lastFilteredCards);
        }

        function exportToDeckLog() {
            const items = Object.entries(myDeck).map(([id, count]) => ({ id, count }));
            if (items.length === 0) return alert("カードが選択されていません");
            const params = new URLSearchParams({ c: "9", l: "ja", items: JSON.stringify(items) });
            window.open(`https://decklog.bushiroad.com/create?${params.toString()}`, '_blank');
        }

        // 検索ロジック（完全復元）
        let lastFilteredCards = [];
        function applyFilters() {
            let result = allCards;
            const includeText = document.getElementById('searchIncludeText').checked;
            
            if (activeFilters.text) {
                let keys = [{ name: 'name', weight: 1.0 }, { name: 'id', weight: 0.5 }, { name: 'tags', weight: 0.7 }];
                if (includeText) keys.push({ name: 'description', weight: 0.4 }, { name: 'arts.name', weight: 0.4 }, { name: 'arts.text', weight: 0.4 });
                const fuse = new Fuse(allCards, { keys, threshold: 0.3 });
                result = fuse.search(activeFilters.text).map(r => r.item);
            }
            
            if (activeFilters.category.length > 0) result = result.filter(c => activeFilters.category.includes(c.category));
            if (activeFilters.color) result = result.filter(c => (c.color || '無').replace('◇','無') === activeFilters.color);
            if (activeFilters.kind.length > 0) result = result.filter(c => activeFilters.kind.some(k => (c.kind || '').includes(k)));
            if (activeFilters.baton.length > 0) result = result.filter(c => activeFilters.baton.includes(String(c.baton_touch)));
            if (activeFilters.tokkou) result = result.filter(c => c.arts && c.arts.some(a => a.tokkou && a.tokkou.includes(activeFilters.tokkou)));
            
            lastFilteredCards = result;
            renderCards(result);
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = cards.length;
            grid.innerHTML = cards.map(card => `
                <div class="relative group cursor-pointer" onclick="showDetail('${card.id}')">
                    <img src="${card.img}" class="rounded shadow-sm group-hover:shadow-md transition-all border" loading="lazy">
                    ${myDeck[card.id] ? `<div class="absolute -top-1 -right-1 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold shadow-lg ring-2 ring-white">${myDeck[card.id]}</div>` : ''}
                </div>
            `).join('');
        }

        function showDetail(cardId) {
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;
            
            document.getElementById('modalImg').src = card.img;
            document.getElementById('modalName').innerText = card.name;
            document.getElementById('modalIdDisplay').innerText = card.id;
            document.getElementById('modalCardCount').innerText = myDeck[cardId] || 0;
            document.getElementById('btnMinus').onclick = () => updateDeck(card.id, -1);
            document.getElementById('btnPlus').onclick = () => updateDeck(card.id, 1);

            // 高度な詳細表示を再構築
            let details = "";
            const createRow = (label, value, extraClass = "") => {
                if (!value || value === "nan" || value === "0") return "";
                return `<div class="flex items-start mb-1 gap-3"><span class="label-pill ${extraClass}">${label}</span><div class="value-box">${value}</div></div>`;
            };

            details += createRow('色', (card.color || '無').replace('◇','無'));
            if (card.category === "ホロメン") {
                details += createRow('HP', card.value); details += createRow('Bloom', card.kind); details += createRow('バトン', card.baton_touch);
                if (card.keywordName) details += `<div class="flex items-start mb-1 gap-3"><span class="label-pill keyword-pill">キーワード</span><div class="value-box"><div class="font-black">【${card.keywordName}】</div><div>${card.keywordEffect}</div></div></div>`;
            }
            if (card.arts) card.arts.forEach(art => {
                details += `<div class="flex items-start mb-1 gap-3 border-t pt-2"><span class="label-pill arts-pill">アーツ</span><div class="value-box"><div><span class="font-black">${art.name}</span> <span class="text-red-600">${art.damage || ''}</span></div><div class="text-sm text-slate-600">${art.text}</div></div></div>`;
            });
            if (card.skills) card.skills.forEach(s => details += createRow(s.label, s.text, s.label.includes('ステージ') ? 'stage-pill' : 'oshi-pill'));

            document.getElementById('modalDetails').innerHTML = details;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // イベント設定
        function closeModal() { document.getElementById('modal').classList.remove('active'); document.body.style.overflow = ''; }
        function toggleMobileFilter() { document.getElementById('filterSidebar').classList.toggle('mobile-open'); document.getElementById('filterOverlay').classList.toggle('active'); }
        function toggleLogic(g) { logicState[g] = logicState[g] === 'OR' ? 'AND' : 'OR'; const el = document.getElementById(`logic-${g}`); el.innerText = logicState[g]; el.classList.toggle('logic-or'); el.classList.toggle('logic-and'); applyFilters(); }

        document.getElementById('searchInput').addEventListener('input', e => { activeFilters.text = e.target.value; applyFilters(); });
        document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
            const g = btn.dataset.group; const v = btn.dataset.val;
            if (activeFilters[g].includes(v)) activeFilters[g] = activeFilters[g].filter(x => x !== v);
            else activeFilters[g].push(v);
            btn.classList.toggle('filter-active');
            applyFilters();
        }));
        document.querySelectorAll('.color-dot').forEach(btn => btn.addEventListener('click', () => {
            const t = btn.dataset.type; const v = btn.dataset.val;
            if (t === 'color') activeFilters.color = (activeFilters.color === v) ? '' : v;
            else activeFilters.tokkou = (activeFilters.tokkou === v) ? '' : v;
            document.querySelectorAll(`.color-dot[data-type="${t}"]`).forEach(b => b.classList.remove('ring-4', 'ring-[#5e5a9b]/50'));
            if (activeFilters[t]) btn.classList.add('ring-4', 'ring-[#5e5a9b]/50');
            applyFilters();
        }));

        async function init() {
            try {
                const res = await fetch('./master_cards.json');
                allCards = await res.json();
                lastFilteredCards = allCards;
                updateUI();
            } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
