<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloCG Viewer_0.9 - Clean Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'holo-pill': '#5e5a9b',
                'holo-arts-start': '#5f76e0',
                'holo-arts-end': '#e6659c',
              }
            }
          }
        }
    </script>
    <style>
        .description-box { font-size: 11px; line-height: 1.6; color: #4a5568; }
        /* 項目ラベルの共通スタイル */
        .item-label {
            background-color: #5e5a9b;
            color: white;
            padding: 2px 12px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: bold;
            display: inline-block;
            margin-right: 8px;
        }
        /* 値のスタイル（背景なし） */
        .item-value {
            font-size: 12px;
            font-weight: 500;
            color: #2d3748;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-white text-slate-900 sticky top-0 z-50 shadow-sm border-b border-slate-100 p-3">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row gap-3 items-center">
            <h1 class="font-bold tracking-tighter text-xl text-holo-pill uppercase">Holo Viewer</h1>
            <div class="flex-1 w-full">
                <input type="text" id="searchInput" placeholder="名前、効果、タグ、ナンバーで検索..." 
                    class="w-full bg-slate-100 border border-slate-200 rounded-full px-5 py-2 text-sm outline-none focus:ring-2 focus:ring-holo-pill/30 transition-all">
            </div>
            <div id="resultCount" class="text-[10px] font-mono bg-slate-100 px-4 py-2 rounded-full text-slate-500 border border-slate-200 uppercase">READY</div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6">
        <div id="cardGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
        <div id="noResult" class="hidden text-center py-24 text-slate-400 text-xl font-bold">カードが見つかりません</div>
    </main>

    <script>
        let allCards = [];
        let fuse;

        async function init() {
            try {
                const res = await fetch('./master_cards.json?v=' + new Date().getTime());
                allCards = await res.json();
                fuse = new Fuse(allCards, { keys: ['name', 'description', 'id', 'tags'], threshold: 0.3 });
                render(allCards);
            } catch (e) { console.error(e); }
        }

        // 項目と値をセットで表示する関数
        function renderStatusItem(label, value) {
            if (!value || value === "0") return "";
            return `
                <div class="flex items-center mr-4 mb-2">
                    <span class="item-label">${label}</span>
                    <span class="item-value">${value}</span>
                </div>`;
        }

        function render(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = `${cards.length.toLocaleString()} CARDS FOUND`;
            
            grid.innerHTML = '';
            if (cards.length === 0) { document.getElementById('noResult').classList.remove('hidden'); return; }
            document.getElementById('noResult').classList.add('hidden');

            cards.forEach(card => {
                const wrap = document.createElement('div');
                wrap.className = "bg-white rounded-3xl shadow-lg border border-slate-100 p-4 md:p-6 transition-all hover:shadow-xl h-full";
                
                // ステータス行の生成（値の背景を削除）
                let statusRow = "";
                if (card.category === "ホロメン") {
                    statusRow = `
                        <div class="flex flex-wrap mb-4">
                            ${renderStatusItem('色', card.color)}
                            ${renderStatusItem('HP', card.value)}
                            ${renderStatusItem('Bloomレベル', card.kind)}
                            ${renderStatusItem('バトンタッチ', card.baton)}
                        </div>`;
                } else if (card.category === "推しホロメン") {
                    statusRow = `
                        <div class="flex flex-wrap mb-4">
                            ${renderStatusItem('色', card.color)}
                            ${renderStatusItem('LIFE', card.value)}
                        </div>`;
                }

                wrap.innerHTML = `
                    <div class="flex flex-col md:flex-row h-full gap-6">
                        <div class="w-full md:w-[260px] flex-shrink-0 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center p-2">
                            <img src="${card.img}" class="max-w-full max-h-[340px] object-contain rounded-lg shadow-sm" loading="lazy" onerror="this.src='https://placehold.jp/cccccc/ffffff/280x390.png?text=No Image'">
                        </div>
                        
                        <div class="flex-1 flex flex-col">
                            <div class="flex flex-wrap items-baseline gap-x-4 mb-3 border-b border-slate-100 pb-3">
                                <h3 class="font-black text-2xl text-holo-pill">${card.name}</h3>
                                <span class="text-xs font-mono text-slate-400 uppercase tracking-widest">ナンバー：${card.id}</span>
                            </div>
                            
                            <div class="flex-1">
                                <div class="flex flex-wrap gap-2 mb-3">
                                    ${card.tags.map(t => `<span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-[10px] font-bold">${t}</span>`).join('')}
                                </div>
                                
                                ${statusRow}

                                <div class="description-box space-y-4">
                                    ${card.category === "ホロメン" ? `
                                        <div>
                                            <span class="inline-block bg-gradient-to-r from-holo-arts-start to-holo-arts-end text-white px-4 py-1 rounded-full text-[10px] font-bold uppercase mb-2">アーツ</span>
                                            <div class="pl-1 whitespace-pre-wrap">${card.description}</div>
                                        </div>
                                    ` : `
                                        <div class="whitespace-pre-wrap">${card.description}</div>
                                    `}
                                </div>
                            </div>
                        </div>
                    </div>`;
                grid.appendChild(wrap);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const res = e.target.value ? fuse.search(e.target.value).map(r => r.item) : allCards;
            render(res);
        });

        init();
    </script>
</body>
</html>
