<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoloCG Viewer 0.92- Full Specs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        .label-pill {
            background-color: #5e5a9b; color: white; padding: 2px 12px; border-radius: 9999px;
            font-size: 10px; font-weight: bold; min-width: 90px; text-align: center; flex-shrink: 0;
        }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .keyword-pill { background-color: #10b981; }
        .product-pill { background-color: #6366f1; }
        .extra-pill { background-color: #f59e0b; }
        .value-box { font-size: 12px; line-height: 1.5; color: #1a202c; flex: 1; }
    </style>
</head>
<body class="bg-slate-50">

    <header class="bg-white border-b p-3 sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1400px] mx-auto flex gap-4 items-center">
            <h1 class="font-bold text-xl text-[#5e5a9b]">HOLO-VIEWER</h1>
            <input type="text" id="searchInput" placeholder="名前、アーツ、商品名で検索..." 
                class="flex-1 bg-slate-100 rounded-full px-6 py-2 text-sm outline-none">
            <div id="resultCount" class="text-xs font-mono text-slate-400">READY</div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-4 md:p-6">
        <div id="cardGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
    </main>

    <script>
        let allCards = [];
        let fuse;

        async function init() {
            const res = await fetch('./master_cards.json?v=' + Date.now());
            allCards = await res.json();
            fuse = new Fuse(allCards, { keys: ['name', 'description', 'keyword', 'product', 'id'], threshold: 0.3 });
            render(allCards);
        }

        function createRow(label, value, extraClass = "") {
            if (!value || value === "0" || value === "nan" || value === "undefined") return "";
            return `<div class="flex items-start mb-3 gap-3">
                        <span class="label-pill ${extraClass}">${label}</span>
                        <div class="value-box whitespace-pre-wrap">${value}</div>
                    </div>`;
        }

        function render(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = `${cards.length} CARDS`;
            grid.innerHTML = '';

            cards.forEach(card => {
                const wrap = document.createElement('div');
                wrap.className = "bg-white rounded-[2rem] shadow-md border p-6 flex flex-col md:flex-row gap-6 hover:shadow-xl transition-all";
                
                wrap.innerHTML = `
                    <div class="w-full md:w-[220px] shrink-0 bg-slate-50 rounded-2xl p-2 flex items-center justify-center">
                        <img src="${card.img}" class="max-h-[320px] object-contain rounded" loading="lazy">
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-baseline border-b pb-2 mb-4">
                            <h3 class="text-2xl font-black text-[#5e5a9b]">${card.name}</h3>
                            <span class="text-[10px] font-mono text-slate-400 uppercase">${card.id}</span>
                        </div>
                        <div class="flex gap-2 mb-4">
                            <span class="bg-slate-800 text-white px-3 py-0.5 rounded-full text-[10px] font-bold">タグ</span>
                            <div class="text-[10px] text-slate-500 font-bold">${card.tags.join(' ')}</div>
                        </div>
                        ${createRow('色', card.color)}
                        ${card.category === 'ホロメン' ? createRow('HP', card.value) : createRow('LIFE', card.value, 'bg-green-600')}
                        ${createRow('Bloomレベル', card.kind)}
                        ${createRow('バトンタッチ', card.baton)}
                        ${createRow('キーワード', card.keyword, 'keyword-pill')}
                        ${createRow('アーツ', card.description, 'arts-pill')}
                        ${createRow('エクストラ', card.extra, 'extra-pill')}
                        ${createRow('収録商品', card.product, 'product-pill')}
                    </div>`;
                grid.appendChild(wrap);
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            render(e.target.value ? fuse.search(e.target.value).map(r => r.item) : allCards);
        });
        init();
    </script>
</body>
</html>
