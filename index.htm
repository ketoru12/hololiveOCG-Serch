<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoloCG Viewer - Final Specification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        .label-pill {
            background-color: #5e5a9b; color: white; padding: 2px 14px; border-radius: 999px;
            font-size: 10px; font-weight: bold; min-width: 90px; text-align: center; flex-shrink: 0;
        }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .keyword-pill { background-color: #10b981; }
        .oshi-pill { background-color: #ef4444; }
        .product-pill { background-color: #6366f1; }
        .value-box { font-size: 12px; font-weight: 500; line-height: 1.6; color: #1a202c; flex: 1; }
        
        /* コストと特攻のバッジスタイル */
        .badge-cost { background-color: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        .badge-tokkou { background-color: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-[1600px] mx-auto flex gap-4 items-center">
            <h1 class="font-bold text-xl text-[#5e5a9b] tracking-tighter">HOLO-VIEWER</h1>
            <input type="text" id="searchInput" placeholder="カード名、特攻(赤+50等)、タグ(#歌等)で検索..." 
                class="flex-1 bg-slate-100 rounded-full px-6 py-2 text-sm outline-none focus:ring-2 focus:ring-[#5e5a9b]/30">
            <div id="resultCount" class="text-xs font-mono text-slate-400">READY</div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-8">
        <div id="cardGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-8"></div>
    </main>

    <script>
        let allCards = [];
        let fuse;

        async function init() {
            const res = await fetch('./master_cards.json?v=' + Date.now());
            allCards = await res.json();
            fuse = new Fuse(allCards, { 
                keys: ['name', 'arts.name', 'arts.text', 'arts.tokkou', 'tags', 'keywordName', 'id'], 
                threshold: 0.3 
            });
            renderCards(allCards);
        }

        function createRow(label, value, extraClass = "") {
            if (!value || value === "0" || value === "" || value === "nan") return "";
            return `<div class="flex items-start mb-4 gap-4">
                        <span class="label-pill ${extraClass}">${label}</span>
                        <div class="value-box whitespace-pre-wrap">${value}</div>
                    </div>`;
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = `${cards.length} CARDS`;
            grid.innerHTML = '';

            cards.forEach(card => {
                const wrap = document.createElement('div');
                wrap.className = "bg-white rounded-[2.5rem] shadow-lg border p-6 md:p-8 flex flex-col md:flex-row gap-8 hover:shadow-2xl transition-all h-full";
                
                let details = "";
                details += createRow('色', card.color);
                if (card.category === "ホロメン") {
                    details += createRow('HP', card.value);
                    details += createRow('Bloomレベル', card.kind);
                    details += createRow('バトンタッチ', card.baton);
                } else if (card.category === "推しホロメン") {
                    details += createRow('LIFE', card.value, 'bg-green-600');
                }

                // キーワード
                if (card.keywordName) {
                    details += `<div class="flex items-start mb-4 gap-4">
                                    <span class="label-pill keyword-pill">キーワード</span>
                                    <div class="value-box">
                                        <div class="font-black text-slate-800 mb-0.5">【${card.keywordName}】</div>
                                        <div class="text-slate-600 text-[11px]">${card.keywordEffect}</div>
                                    </div>
                                </div>`;
                }

                // アーツ（コスト・特攻のバッジ対応）
                if (card.arts && card.arts.length > 0) {
                    card.arts.forEach(art => {
                        details += `
                            <div class="flex items-start mb-4 gap-4">
                                <span class="label-pill arts-pill">アーツ</span>
                                <div class="value-box">
                                    <div class="flex flex-wrap items-center gap-2 mb-1">
                                        <span class="font-black text-slate-800 text-[13px]">${art.name}</span>
                                        ${art.icons ? `<span class="badge-cost">コスト: ${art.icons}</span>` : ''}
                                        ${art.tokkou ? `<span class="badge-tokkou">特攻: ${art.tokkou}</span>` : ''}
                                    </div>
                                    <div class="text-slate-600 text-[11px] whitespace-pre-wrap">${art.text}</div>
                                </div>
                            </div>`;
                    });
                }

                if (card.skills) card.skills.forEach(s => details += createRow(s.label, s.text, 'oshi-pill'));
                if (card.description) details += createRow('効果', card.description);
                if (card.extra) details += createRow('エクストラ', card.extra, 'bg-orange-500');
                if (card.product) details += createRow('収録商品', card.product, 'product-pill');

                wrap.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-8 h-full w-full">
                        <div class="w-full md:w-[240px] shrink-0 bg-slate-50 rounded-3xl p-3 flex items-center justify-center border border-slate-100 shadow-inner">
                            <img src="${card.img}" class="max-h-[350px] object-contain rounded-lg shadow-sm" loading="lazy">
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-baseline border-b pb-3 mb-4">
                                <h3 class="text-2xl font-black text-[#5e5a9b] tracking-tighter">${card.name}</h3>
                                <span class="text-[10px] font-mono text-slate-400 uppercase tracking-widest">${card.id}</span>
                            </div>
                            <div class="flex items-center gap-3 mb-6">
                                <span class="bg-slate-800 text-white px-3 py-1 rounded-full text-[9px] font-bold tracking-widest uppercase">タグ</span>
                                <div class="text-[10px] text-slate-500 font-bold">${card.tags ? card.tags.join(' ') : ''}</div>
                            </div>
                            ${details}
                        </div>
                    </div>`;
                grid.appendChild(wrap);
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            renderCards(e.target.value ? fuse.search(e.target.value).map(r => r.item) : allCards);
        });
        init();
    </script>
</body>
</html>
