<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hololive CG Viewer Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        .line-clamp-custom { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

    <header class="bg-slate-800 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-wrap gap-4 items-center justify-between">
            <h1 class="font-bold text-lg">HoloCG Data Viewer</h1>
            <input type="text" id="searchInput" placeholder="名前、スキル、#タグ..." 
                class="flex-1 min-w-[200px] border-none rounded-lg p-2 text-gray-800 focus:ring-2 focus:ring-blue-400">
            <div id="resultCount" class="text-xs font-mono bg-slate-700 px-3 py-1 rounded">Loading...</div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto p-4">
        <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
    </div>

    <script>
        let allCards = [];
        let fuse;

        async function init() {
            try {
                const res = await fetch('./master_cards.json');
                allCards = await res.json();
                fuse = new Fuse(allCards, { keys: ['name', 'description', 'tags', 'id'], threshold: 0.3 });
                render(allCards);
            } catch (e) { console.error("Data Load Error:", e); }
        }

        function render(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = `${cards.length} cards`;
            grid.innerHTML = '';

            cards.forEach(card => {
                const wrap = document.createElement('div');
                wrap.className = "bg-white rounded-lg shadow-sm overflow-hidden flex flex-col border-t-4 transition-transform hover:scale-[1.02]";
                
                // 色設定
                const colors = {'白':'border-gray-400','緑':'border-green-500','赤':'border-red-500','青':'border-blue-500','紫':'border-purple-500','黄':'border-yellow-400'};
                wrap.classList.add(colors[card.color] || 'border-slate-200');

                // 動的ステータス（HP/LIFE, Bloom, Baton）
                const isOshi = card.category === "推しホロメン";
                const valLabel = isOshi ? "LIFE" : "HP";
                const valColor = isOshi ? "text-green-600 bg-green-50" : "text-red-600 bg-red-50";
                
                let statsHtml = "";
                if (card.category === "ホロメン") {
                    statsHtml = `
                        <div class="flex gap-2 text-[9px] font-bold text-slate-500 mt-1 uppercase">
                            <span>Bloom: ${card.kind}</span>
                            <span>Baton: ${card.baton}</span>
                        </div>`;
                }

                wrap.innerHTML = `
                    <div class="relative pt-[140%] bg-slate-100">
                        <img src="${card.img}" class="absolute top-0 left-0 w-full h-full object-cover" loading="lazy">
                    </div>
                    <div class="p-3 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[9px] text-slate-400 font-mono">${card.id}</span>
                            ${card.value !== "0" ? `<span class="${valColor} px-1.5 py-0.5 rounded text-[10px] font-black">${valLabel} ${card.value}</span>` : ""}
                        </div>
                        <h3 class="font-black text-xs mb-1 line-clamp-1">${card.name}</h3>
                        ${statsHtml}
                        
                        <div class="mt-2 space-y-1 text-[10px] text-slate-600 leading-tight flex-1">
                            ${card.description.split('\n').map(text => `
                                <p class="line-clamp-custom border-l-2 border-slate-100 pl-1 mb-1">${text}</p>
                            `).join('')}
                        </div>

                        <div class="mt-3 pt-2 border-t border-slate-50 flex justify-between items-center text-[9px]">
                            <span class="font-bold text-blue-500">${card.category}</span>
                            <span class="text-slate-300">${card.tags.slice(0,1)}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(wrap);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const res = e.target.value ? fuse.search(e.target.value).map(r => r.item) : allCards;
            render(res);
        });

        init();
    </script>
</body>
</html>
