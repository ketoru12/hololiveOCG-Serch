<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Holo-Viewer | Custom Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        .label-pill { background-color: #5e5a9b; color: white; padding: 2px 10px; border-radius: 999px; font-size: 14px; font-weight: bold; min-width: 110px; text-align: center; flex-shrink: 0; }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .keyword-pill { background-color: #10b981; }
        .oshi-pill { background-color: #ef4444; }
        .stage-pill { background-color: #3b82f6; }
        .tag-pill { background-color: #94a3b8; }
        .product-pill { background-color: #6366f1; }
        .extra-pill { background-color: #f59e0b; }
        .kind-pill { background-color: #64748b; }
        .value-box { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a202c; flex: 1; }
        .badge-base { padding: 2px 8px; border-radius: 4px; font-size: 15px; font-weight: 800; border: 1px solid transparent; }
        .color-white { background-color: #f8fafc; color: #475569; border-color: #e2e8f0; }
        .color-green { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .color-red { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .color-blue { background-color: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
        .color-purple { background-color: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
        .color-yellow { background-color: #fefce8; color: #854d0e; border-color: #fef08a; }
        .color-none { background-color: #f1f5f9; color: #334155; border-color: #cbd5e1; }
        #modal { display: none; }
        #modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #5e5a9b; border-radius: 10px; }
        
        .filter-active { background-color: #5e5a9b !important; color: white !important; font-weight: bold; border-color: #5e5a9b !important; }
        .logic-toggle { font-size: 10px; padding: 1px 6px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .logic-and { background-color: #ef4444; color: white; }
        .logic-or { background-color: #3b82f6; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        
        <aside class="w-full md:w-80 bg-white border-r flex flex-col shadow-lg z-50">
            <div class="p-4 border-b bg-[#5e5a9b] text-white flex justify-between items-center shrink-0">
                <h1 class="font-bold tracking-wider italic">HOLO-VIEWER</h1>
                <span id="resultCount" class="text-[10px] font-mono bg-white/20 px-2 py-1 rounded">0 枚</span>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-5">
                <div>
                    <label class="block text-[11px] font-black text-slate-400 mb-2 uppercase tracking-tighter">検索ワード</label>
                    <input type="text" id="searchInput" placeholder="名前、タグ、ID、効果..." 
                        class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#5e5a9b]/30 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-[11px] font-black text-slate-400 mb-2 uppercase tracking-tighter">収録</label>
                    <select id="filterProduct" class="w-full border rounded-lg px-3 py-2 text-sm bg-white outline-none focus:ring-2 focus:ring-[#5e5a9b]/30">
                        <option value="">すべて</option>
                    </select>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">カードタイプ</label>
                        <div class="logic-toggle logic-or" id="logic-category" onclick="toggleLogic('category')">OR検索</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white hover:bg-slate-50" data-group="category" data-val="ホロメン">ホロメン</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white hover:bg-slate-50" data-group="category" data-val="推しホロメン">推し</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white hover:bg-slate-50" data-group="category" data-val="サポート">サポート</button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">Bloomレベル</label>
                        <div class="logic-toggle logic-or" id="logic-kind" onclick="toggleLogic('kind')">OR検索</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="kind" data-val="Spot">Spot</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="kind" data-val="Debut">Debut</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="kind" data-val="1st">1st</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="kind" data-val="2nd">2nd</button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">サポート</label>
                        <div class="logic-toggle logic-or" id="logic-subKind" onclick="toggleLogic('subKind')">OR検索</div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="subKind" data-val="LIMITED">LIMITED</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="subKind" data-val="ツール">ツール</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="subKind" data-val="イベント">イベント</button>
                        <button class="filter-btn px-2.5 py-1.5 text-xs border rounded bg-white" data-group="subKind" data-val="スタッフ">スタッフ</button>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-black text-slate-400 mb-2 uppercase tracking-tighter">色</label>
                    <div class="flex flex-wrap gap-2">
                        <button class="color-dot w-7 h-7 rounded-full border bg-red-500" data-val="赤"></button>
                        <button class="color-dot w-7 h-7 rounded-full border bg-blue-500" data-val="青"></button>
                        <button class="color-dot w-7 h-7 rounded-full border bg-green-500" data-val="緑"></button>
                        <button class="color-dot w-7 h-7 rounded-full border bg-yellow-400" data-val="黄"></button>
                        <button class="color-dot w-7 h-7 rounded-full border bg-purple-500" data-val="紫"></button>
                        <button class="color-dot w-7 h-7 rounded-full border bg-white" data-val="白"></button>
                        <button class="color-dot w-7 h-7 rounded-full border bg-slate-400" data-val="無"></button>
                    </div>
                </div>

                <button id="resetFilters" class="w-full py-2 text-[11px] font-black text-slate-400 hover:text-red-500 border-2 border-dashed rounded-lg transition-colors">フィルターリセット</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 bg-slate-50">
            <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 2xl:grid-cols-8 gap-4"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4" onclick="closeModal()">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto flex flex-col md:flex-row gap-6 p-6 relative shadow-2xl" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-2xl" onclick="closeModal()">✕</button>
            <div class="w-full md:w-1/3 shrink-0"><img id="modalImg" src="" class="w-full rounded-lg shadow border"></div>
            <div class="flex-1">
                <div class="flex justify-between items-baseline border-b-2 border-slate-100 pb-2 mb-4">
                    <h2 id="modalName" class="text-2xl font-bold text-[#5e5a9b]"></h2>
                    <span id="modalId" class="text-sm font-mono text-slate-400"></span>
                </div>
                <div id="modalDetails" class="space-y-2 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        let allCards = [];
        let fuse;
        let activeFilters = { 
            text: '', 
            category: [], 
            kind: [], 
            subKind: [], 
            color: '', 
            product: '' 
        };
        let logiceState = { category: 'OR', kind: 'OR', subKind: 'OR' };

        const colorClassMap = { '白': 'color-white', '緑': 'color-green', '赤': 'color-red', '青': 'color-blue', '紫': 'color-purple', '黄': 'color-yellow', '無': 'color-none', '◇': 'color-none' };

        function toggleLogic(group) {
            const el = document.getElementById(`logic-${group}`);
            if (logiceState[group] === 'OR') {
                logiceState[group] = 'AND';
                el.innerText = 'AND検索';
                el.classList.replace('logic-or', 'logic-and');
            } else {
                logiceState[group] = 'OR';
                el.innerText = 'OR検索';
                el.classList.replace('logic-and', 'logic-or');
            }
            applyFilters();
        }

        function applyFilters() {
            let result = allCards;

            // 1. フリーワード
            if (activeFilters.text) {
                result = fuse.search(activeFilters.text).map(r => r.item);
            }

            // ロジック判定用の汎用関数
            const checkLogic = (cardValue, filterList, logic) => {
                if (filterList.length === 0) return true;
                if (logic === 'OR') return filterList.some(f => cardValue.includes(f));
                return filterList.every(f => cardValue.includes(f));
            };

            // 2. カードタイプ
            if (activeFilters.category.length > 0) {
                result = result.filter(c => checkLogic(c.category || '', activeFilters.category, logiceState.category));
            }

            // 3. Bloomレベル
            if (activeFilters.kind.length > 0) {
                result = result.filter(c => checkLogic(c.kind || '', activeFilters.kind, logiceState.kind));
            }

            // 4. サポート
            if (activeFilters.subKind.length > 0) {
                result = result.filter(c => {
                    const fullText = (c.kind || '') + (c.description || '');
                    return checkLogic(fullText, activeFilters.subKind, logiceState.subKind);
                });
            }

            // 5. 色
            if (activeFilters.color) {
                result = result.filter(c => {
                    const cColor = (c.color === '◇' || !c.color || c.color === 'nan') ? '無' : c.color;
                    return cColor === activeFilters.color;
                });
            }

            // 6. 収録
            if (activeFilters.product) {
                result = result.filter(c => c.product === activeFilters.product);
            }

            renderCards(result);
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = `${cards.length} 枚`;
            grid.innerHTML = '';
            cards.forEach(card => {
                const div = document.createElement('div');
                div.className = "group cursor-pointer hover:-translate-y-1 transition-all";
                div.onclick = () => showDetail(card.id);
                div.innerHTML = `<div class="aspect-[3/4.2] overflow-hidden rounded-md border bg-white shadow-sm group-hover:shadow-lg transition-all"><img src="${card.img}" class="w-full h-full object-cover" loading="lazy"></div>`;
                grid.appendChild(div);
            });
        }

        // --- 詳細表示モーダル関連 ---
        function getTokkouBadgeHtml(text) {
            if (!text || text === "nan") return "";
            const match = text.match(/(白|緑|赤|青|紫|黄|無|◇)/);
            const colorKey = match ? (match[1] === '◇' ? '無' : match[1]) : '無';
            return `<span class="badge-base ${colorClassMap[colorKey]} ml-1">${text.replace('◇', '無')}</span>`;
        }
        function renderCostHtml(iconsStr) {
            if (!iconsStr || iconsStr === "nan") return "";
            return iconsStr.split(',').map(c => {
                const key = c.trim().replace('◇', '無');
                return `<span class="badge-base ${colorClassMap[key] || colorClassMap['無']} mr-1">${key}</span>`;
            }).join('');
        }
        function createRow(label, value, extraClass = "") {
            if (!value || value === "nan" || value === "0") return "";
            return `<div class="flex items-start mb-1 gap-3"><span class="label-pill ${extraClass}">${label}</span><div class="value-box whitespace-pre-wrap">${value}</div></div>`;
        }
        function showDetail(cardId) {
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;
            document.getElementById('modalImg').src = card.img;
            document.getElementById('modalName').innerText = card.name;
            document.getElementById('modalId').innerText = card.id;
            let details = "";
            if (card.category !== "サポート") details += createRow('色', (card.color || '無').replace('◇', '無'));
            if (card.category === "ホロメン") {
                details += createRow('HP', card.value); details += createRow('Bloom', card.kind); details += createRow('バトンタッチ', card.baton_touch);
                if (card.keywordName) details += `<div class="flex items-start mb-1 gap-3"><span class="label-pill keyword-pill">キーワード</span><div class="value-box"><div class="font-black">【${card.keywordName}】</div><div class="text-slate-600">${card.keywordEffect}</div></div></div>`;
            } else if (card.category === "推しホロメン") {
                details += createRow('LIFE', card.value, 'bg-green-600');
            } else if (card.category === "サポート") {
                details += createRow('種別', card.kind, 'kind-pill');
            }
            if (card.arts) {
                card.arts.forEach(art => {
                    details += `<div class="flex items-start mb-1 gap-3 border-t border-slate-50 pt-2"><span class="label-pill arts-pill">アーツ</span><div class="value-box"><div class="flex flex-wrap items-center gap-1"><div class="flex">${renderCostHtml(art.icons)}</div><span class="font-black text-lg">${art.name} ${art.damage}</span>${getTokkouBadgeHtml(art.tokkou)}</div><div class="text-slate-600 text-sm leading-relaxed">${art.text}</div></div></div>`;
                });
            }
            if (card.skills) card.skills.forEach(s => details += createRow(s.label, s.text, s.label === 'ステージスキル' ? 'stage-pill' : 'oshi-pill'));
            if (card.description) details += createRow('能力テキスト', card.description);
            if (card.extra) details += createRow('エクストラ', card.extra, 'extra-pill');
            if (card.tags && card.tags.length > 0) details += createRow('タグ', card.tags.join('　'), 'tag-pill');
            if (card.product) details += createRow('収録', card.product, 'product-pill');
            document.getElementById('modalDetails').innerHTML = details;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); document.body.style.overflow = ''; }

        // --- イベント設定 ---
        document.getElementById('searchInput').addEventListener('input', e => { activeFilters.text = e.target.value; applyFilters(); });
        document.getElementById('filterProduct').addEventListener('change', e => { activeFilters.product = e.target.value; applyFilters(); });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const group = btn.getAttribute('data-group');
                const val = btn.getAttribute('data-val');
                if (activeFilters[group].includes(val)) {
                    activeFilters[group] = activeFilters[group].filter(v => v !== val);
                    btn.classList.remove('filter-active');
                } else {
                    activeFilters[group].push(val);
                    btn.classList.add('filter-active');
                }
                applyFilters();
            });
        });

        document.querySelectorAll('.color-dot').forEach(btn => {
            btn.addEventListener('click', () => {
                const isSelected = btn.classList.contains('ring-4');
                document.querySelectorAll('.color-dot').forEach(b => b.classList.remove('ring-4', 'ring-[#5e5a9b]/50'));
                activeFilters.color = isSelected ? '' : btn.getAttribute('data-val');
                if (!isSelected) btn.classList.add('ring-4', 'ring-[#5e5a9b]/50');
                applyFilters();
            });
        });

        document.getElementById('resetFilters').addEventListener('click', () => {
            activeFilters = { text: '', category: [], kind: [], subKind: [], color: '', product: '' };
            document.getElementById('searchInput').value = '';
            document.getElementById('filterProduct').value = '';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
            document.querySelectorAll('.color-dot').forEach(b => b.classList.remove('ring-4'));
            applyFilters();
        });

        async function init() {
            try {
                const res = await fetch('./master_cards.json');
                allCards = await res.json();
                const products = [...new Set(allCards.map(c => c.product).filter(p => p && p !== 'nan'))].sort();
                const productSelect = document.getElementById('filterProduct');
                products.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = p;
                    productSelect.appendChild(opt);
                });
                fuse = new Fuse(allCards, { 
                    keys: ['name', 'id', 'tags', 'kind', 'description', 'product', 'arts.name', 'arts.text', 'skills.text', 'keywordName', 'keywordEffect'], 
                    threshold: 0.3 
                });
                renderCards(allCards);
            } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
