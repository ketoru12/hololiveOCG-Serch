<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Holo-Viewer | Definitive Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        .label-pill {
            background-color: #5e5a9b; color: white; padding: 2px 14px; border-radius: 999px;
            font-size: 10px; font-weight: bold; min-width: 90px; text-align: center; flex-shrink: 0;
        }
        .arts-pill { background: linear-gradient(90deg, #5f76e0, #e6659c); }
        .oshi-pill { background-color: #ef4444; }
        .product-pill { background-color: #6366f1; }
        .value-box { font-size: 12px; font-weight: 500; line-height: 1.6; color: #1a202c; flex: 1; }
        
        .badge-base { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; border: 1px solid transparent; }
        
        /* 特攻・コスト用カラー定義 */
        .color-white { background-color: #f8fafc; color: #475569; border-color: #e2e8f0; }
        .color-green { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .color-red { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .color-blue { background-color: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
        .color-purple { background-color: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
        .color-yellow { background-color: #fefce8; color: #854d0e; border-color: #fef08a; }
        .color-none { background-color: #f1f5f9; color: #334155; border-color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-[1600px] mx-auto flex gap-4 items-center">
            <h1 class="font-bold text-xl text-[#5e5a9b] tracking-tighter">HOLO-VIEWER</h1>
            <input type="text" id="searchInput" placeholder="カード名、特攻、タグなどで検索..." 
                class="flex-1 bg-slate-100 rounded-full px-6 py-2 text-sm outline-none focus:ring-2 focus:ring-[#5e5a9b]/30">
            <div id="resultCount" class="text-xs font-mono text-slate-400">READY</div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-8">
        <div id="cardGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-8"></div>
    </main>

    <script>
        let allCards = [];
        let fuse;
        const colorClassMap = {
            '白': 'color-white', '緑': 'color-green', '赤': 'color-red',
            '青': 'color-blue', '紫': 'color-purple', '黄': 'color-yellow', '無': 'color-none'
        };

        function getTokkouBadgeHtml(text) {
            if (!text) return "";
            const match = text.match(/(白|緑|赤|青|紫|黄|無)/);
            const colorClass = match ? colorClassMap[match[1]] : colorClassMap['無'];
            return `<span class="badge-base ${colorClass}">${text}</span>`;
        }

        function renderCostHtml(iconsStr) {
            if (!iconsStr) return "";
            return iconsStr.split(',').map(c => {
                const colorClass = colorClassMap[c.trim()] || colorClassMap['無'];
                return `<span class="badge-base ${colorClass} mr-1">${c.trim()}</span>`;
            }).join('');
        }

        function createRow(label, value, extraClass = "") {
            if (!value || value === "0" || value === "" || value === "nan") return "";
            return `<div class="flex items-start mb-4 gap-4">
                        <span class="label-pill ${extraClass}">${label}</span>
                        <div class="value-box whitespace-pre-wrap">${value}</div>
                    </div>`;
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardGrid');
            document.getElementById('resultCount').innerText = `${cards.length} CARDS FOUND`;
            grid.innerHTML = '';

            cards.forEach(card => {
                const wrap = document.createElement('div');
                wrap.className = "bg-white rounded-[2.5rem] shadow-lg border p-6 md:p-8 flex flex-col md:flex-row gap-8 hover:shadow-2xl transition-all h-full";
                
                let details = "";
                details += createRow('色', card.color);
                if (card.category === "ホロメン") {
                    details += createRow('HP', card.value);
                    details += createRow('Bloom', card.kind);
                } else if (card.category === "推しホロメン") {
                    details += createRow('LIFE', card.value, 'bg-green-600');
                }

                if (card.arts) {
                    card.arts.forEach(art => {
                        details += `
                            <div class="flex items-start mb-4 gap-4">
                                <span class="label-pill arts-pill">アーツ</span>
                                <div class="value-box">
                                    <div class="flex flex-wrap items-center gap-2 mb-1">
                                        <div class="flex">${renderCostHtml(art.icons)}</div>
                                        <span class="font-black text-[13px] text-slate-800">${art.name} ${art.damage}</span>
                                        ${getTokkouBadgeHtml(art.tokkou)}
                                    </div>
                                    <div class="text-slate-600 text-[11px] whitespace-pre-wrap">${art.text}</div>
                                </div>
                            </div>`;
                    });
                }

                if (card.skills) card.skills.forEach(s => details += createRow(s.label, s.text, 'oshi-pill'));
                if (card.description) details += createRow('効果', card.description);
                if (card.product) details += createRow('収録', card.product, 'product-pill');

                wrap.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-8 w-full">
                        <div class="w-full md:w-[220px] shrink-0">
                            <img src="${card.img}" class="rounded-xl shadow-md border w-full h-auto" loading="lazy">
                        </div>
                        <div class="flex-1">
                            <div class="border-b pb-2 mb-3">
                                <h3 class="text-2xl font-black text-[#5e5a9b]">${card.name}</h3>
                                <span class="text-[10px] font-mono text-slate-400 uppercase">${card.id}</span>
                            </div>
                            <div class="mb-4">
                                ${card.tags.map(t => `<span class="text-[10px] text-slate-500 font-bold mr-2">${t}</span>`).join('')}
                            </div>
                            ${details}
                        </div>
                    </div>`;
                grid.appendChild(wrap);
            });
        }

        async function init() {
            const res = await fetch('./master_cards.json');
            allCards = await res.json();
            fuse = new Fuse(allCards, { keys: ['name', 'arts.name', 'arts.tokkou', 'tags'], threshold: 0.3 });
            renderCards(allCards);
        }
        document.getElementById('searchInput').addEventListener('input', e => {
            renderCards(e.target.value ? fuse.search(e.target.value).map(r => r.item) : allCards);
        });
        init();
    </script>
</body>
</html>
